<!doctype html>
<!-- MET Practice Platform -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MET Practice Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" />
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var dictWin = null;
        document.addEventListener('dblclick', function(e) {
          var sel = window.getSelection();
          var word = (sel.toString() || '').trim();
          if (!word || word.length < 2 || word.length > 30 || /\s/.test(word) || /\d/.test(word)) return;
          var url = 'https://dictionary.cambridge.org/dictionary/english/' + encodeURIComponent(word.toLowerCase());
          var w = 520, h = 700;
          var left = Math.round(screen.width / 2 - w / 2);
          var top = Math.round(screen.height / 2 - h / 2);
          if (dictWin && !dictWin.closed) {
            dictWin.location.href = url;
            dictWin.focus();
          } else {
            dictWin = window.open(url, 'vv_cambridge', 'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',scrollbars=yes,resizable=yes');
          }
        });
      })();
    </script>
  </body>
</html>
