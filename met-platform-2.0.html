wer":1,"explanation":"Speaker A notes: 'traffic looks bad. The bus lane may actually be quicker.'"},{"id":3,"question":"Who will receive a warning message?","options":["Their hotel host","The cooking class instructor","The train operator","The taxi service agent"],"correctAnswer":1,"explanation":"Speaker B asks to 'message the instructor' because they might arrive late."}],"preListening":"Students predict transport problems during a trip.","postListening":"Students role-play solving a late-arrival problem."},"vocabulary":{"title":"Sustainable Lifestyles","difficulty":"B2-","type":"collocation","items":[{"phrase":"reusable","definition":"able to be used more than once","example":"Always bring a reusable water bottle."},{"phrase":"container","definition":"an object like a box or jar for holding items","example":"Bring an empty glass container for rice."},{"phrase":"packaging","definition":"materials used to wrap or protect goods","example":"Avoid cereal boxes with heavy plastic packaging."},{"phrase":"waste","definition":"unwanted materials that are thrown away","example":"Refill shopping reduces home plastic waste."},{"phrase":"refill","definition":"to fill a container again with a substance","example":"I need to refill our soap bottles."},{"phrase":"by weight","definition":"paying based on the heavy mass unit of the item","example":"All beans at the store are sold by weight."},{"phrase":"habit","definition":"something you do regularly and automatically","example":"Waking early is a fantastic habit."},{"phrase":"convenient","definition":"easy to use, near, or fitting your plans","example":"The nearby market is so convenient."}],"matchingGame":[{"phrase":"reusable","definition":"able to be used multiple times"},{"phrase":"container","definition":"box or jar holding food/liquid"},{"phrase":"packaging","definition":"wrapping material around products"},{"phrase":"waste","definition":"unwanted material thrown away"},{"phrase":"refill","definition":"to fill a container again"},{"phrase":"by weight","definition":"pricing based on product mass"},{"phrase":"habit","definition":"automated regular behavior pattern"},{"phrase":"convenient","definition":"easy, nearby, or practical to do"}],"teachingNote":"Encourage students to discuss local recycling habits."},"grammar":{"title":"Second Conditional","difficulty":"B2-","focus":"Hypothetical lifestyle choices and unreal conditions","examples":["If I lived near the beach, I would walk every morning.","If I had more time, I would cook healthy dinners."],"questions":[{"id":1,"sentence":"If I ___ remotely, I ___ to a smaller coastal town.","verb":"work / move","options":["worked / would move","work / would move","worked / will move","work / will move"],"correctAnswer":0,"explanation":"Unreal conditions use past simple in the if-clause ('worked') and 'would + verb' in the result clause ('would move')."},{"id":2,"sentence":"If she ___ more free time, she ___ a local walking group.","verb":"have / join","options":["had / would join","has / will join","have / joined","had / will join"],"correctAnswer":0,"explanation":"Irregular past tense 'had' is used plus 'would join' for hypothetical outcomes."},{"id":3,"sentence":"If we ___ near an organic market, we ___ healthier ingredients.","verb":"live / buy","options":["lived / would buy","live / will buy","lived / will buy","lives / buy"],"correctAnswer":0,"explanation":"Hypothetical condition 'lived' goes with main clause 'would buy' for unreal setups."},{"id":4,"sentence":"If he ___ fewer smartphone notifications, he ___ less overwhelmed.","verb":"receive / feel","options":["received / would feel","receives / will feel","received / will feel","receives / would feel"],"correctAnswer":0,"explanation":"Past simple 'received' specifies unreal present condition; 'would feel' represents hypothetical state."},{"id":5,"sentence":"If they ___ a digital device, they ___ more board games.","verb":"not have / play","options":["didn't have / would play","don't have / would play","didn't have / will play","hadn't / would played"],"correctAnswer":0,"explanation":"Negative past unreal condition 'didn't have' matches result 'would play'."}]},"speaking":{"title":"Roleplay: Special Dietary Requests","difficulty":"B2-","mode":"pair work","setup":"Student A is a customer with a dietary need; Student B is a restaurant host.","timing":"Preparation: 2 minutes. Role-play: 4 minutes.","instructions":"Make a reservation and ask about vegetarian, dairy-free, or low-salt options. The host must offer solutions politely.","followUp":["How should restaurants deal with special requests?","Is healthy food more popular now than before?"],"targetLanguage":["Would it be possible to...?","Do you offer...?","We can prepare...","Let me check that for you."],"teachingNote":"Politeness and functional language practice."},"writing":{"title":"For-and-Against Essay: Rural Relocations","difficulty":"B2","genre":"for-and-against essay","wordCount":"180-230 words","prompt":"Discuss the advantages and disadvantages of moving from a large city to a smaller city for a better lifestyle.","criteria":["Present arguments for both sides clearly","Use appropriate comparative language structures","Conclude with a balanced personal opinion"],"teachingNote":"Supports B2 contrast and argument structure."}},{"id":9,"title":"Unit 9: Refill Shopping & Team Fitness","theme":"Sustainability & Group Workouts","difficulty":"B2 CEFR","reading":{"title":"Shopping with Less Waste","difficulty":"B2","focus":"main idea, vocabulary, detailed comprehension","text":"Refill stores are becoming more common in some neighborhoods. Instead of buying rice, soap, or cereal in new packages each time, customers bring their own containers and pay by weight. Supporters say this reduces plastic waste and encourages people to buy only what they need. However, refill shopping also requires planning. Customers must remember clean containers, check prices carefully, and sometimes visit more than one store to find everything. For people with busy schedules, convenience can be a barrier. Still, some families say the habit becomes easier after a few weeks, especially when they keep a shopping kit near the door.","questions":[{"id":1,"question":"What is the main topic of the passage?","options":["Opening organic chain restaurants","A way to shop with less packaging","Analyzing the rates of home deliveries","How to open a large supermarket"],"correctAnswer":1,"explanation":"The passage introduces 'refill stores' as a way to buy products in existing packages."},{"id":2,"question":"Refill shopping may require more planning than regular shopping.","options":["True","False"],"correctAnswer":0,"explanation":"The writer says: 'refill shopping also requires planning. Customers must remember clean containers...'"},{"id":3,"question":"In the text, 'barrier' means...","options":["an advantage","an obstacle","a container","a discount"],"correctAnswer":1,"explanation":"A 'barrier' represents an impediment or difficulty (an obstacle)."},{"id":4,"question":"What practical suggestion is mentioned to secure the habit?","options":["Keep a shopping kit near the door","Buy separate plastic bags","Avoid comparing prices","Shop only once a year"],"correctAnswer":0,"explanation":"The author suggests keeping a 'shopping kit near the door' to make the habit easier."},{"id":5,"question":"The writer presents refill shopping as...","options":["perfect for everyone","useful but sometimes inconvenient","illegal in most countries","only for very wealthy people"],"correctAnswer":1,"explanation":"The author notes positive benefits (reduces waste) but highlights constraints (requires planning, multiple store visits)."}],"teachingNote":"Ask students to find contrast words: however, still, especially."},"listening":{"title":"Announcement: Community Fitness Day","difficulty":"B2","type":"Announcement","script":[{"id":1,"speaker":"Organizer","text":"Good morning, everyone. Welcome to Community Fitness Day. Activities will begin at nine thirty with a gentle warm-up in the main square."},{"id":2,"speaker":"Organizer","text":"At ten, you can choose between a beginner cycling session, a family walk through the park, or a short workshop on healthy meal planning."},{"id":3,"speaker":"Organizer","text":"Please sign your name at each activity table before joining, as spaces are limited."},{"id":4,"speaker":"Organizer","text":"Water stations are located beside the library and near the playground."},{"id":5,"speaker":"Organizer","text":"If you feel unwell at any time, speak to one of the volunteers wearing blue shirts. Remember, today is not a competition. The goal is to try something new and meet people."}],"questions":[{"id":1,"question":"What time does the gentle warm-up begin?","options":["9:00 a.m.","9:30 a.m.","10:00 a.m.","10:30 a.m."],"correctAnswer":1,"explanation":"The organizer announces: 'Activities will begin at nine thirty...'"},{"id":2,"question":"Why are participants asked to sign their names at tables?","options":["To win organic foods","Because spaces are limited","To qualify for a marathon","To collect custom key cards"],"correctAnswer":1,"explanation":"The text says: 'Please sign your name... as spaces are limited.'"},{"id":3,"question":"What is stated as the main goal of the day?","options":["To break speed records","To try something new and meet neighbors","To raise money for the library","To test cycling equipment"],"correctAnswer":1,"explanation":"The organizer confirms: 'The goal is to try something new and meet people.'"}],"preListening":"Students match activity names to pictures or definitions.","postListening":"Students design a community lifestyle event."},"vocabulary":{"title":"Feelings and Reactions","difficulty":"B2","type":"choose_the_best_word","items":[{"phrase":"relieved","definition":"happy because a difficult problem is gone or avoided","example":"She was relieved that her travel went smoothly."},{"phrase":"overwhelmed","definition":"feeling unable to deal with too much stimulus or work","example":"Too many notifications left him overwhelmed."},{"phrase":"motivated","definition":"wanting to do something due to interest or drive","example":"She felt motivated to try yoga."},{"phrase":"frustrated","definition":"annoyed or impatient because something is hard or blocked","example":"He got frustrated when the train was delayed."},{"phrase":"disconnected","definition":"not feeling emotionally or digitally linked to people/surroundings","example":"Without his phone, he felt disconnected at first."},{"phrase":"calm","definition":"peaceful, quiet, and free from worry","example":"A quiet room facing the garden made her feel calm."},{"phrase":"aware","definition":"knowing or noticing that something exists","example":"Be aware of your screens habits. "},{"phrase":"satisfied","definition":"pleased because you got what you wanted or did well","example":"She felt satisfied with her test score."}],"matchingGame":[{"phrase":"relieved","definition":"happy because a problem is solved"},{"phrase":"overwhelmed","definition":"feeling unable to handle too much"},{"phrase":"motivated","definition":"driven and eager to do something"},{"phrase":"frustrated","definition":"annoyed because progress is blocked"},{"phrase":"disconnected","definition":"isolated, not linked to devices/others"},{"phrase":"calm","definition":"peaceful, quiet, and free from worry"},{"phrase":"aware","definition":"knowing or noticing something exists"},{"phrase":"satisfied","definition":"pleased with results or actions"}],"teachingNote":"Great vocabulary for discussing emotional states during change."},"grammar":{"title":"Relative Clauses","difficulty":"B2-","focus":"Defining relative clauses to describe places, things, and people","examples":["The café that opened near my office is excellent.","The guide, who was very friendly, explained the route."],"questions":[{"id":1,"sentence":"The hotel ___ we stayed was near the beautiful river.","verb":"place","options":["where","which","who","when"],"correctAnswer":0,"explanation":"Use relative adverb 'where' to describe locations."},{"id":2,"sentence":"The friendly receptionist ___ changed my room was helpful.","verb":"person","options":["who","which","where","whose"],"correctAnswer":0,"explanation":"Use 'who' or 'that' as the relative pronoun for people."},{"id":3,"sentence":"The smartphone app ___ tracks my routines sends daily alerts.","verb":"thing","options":["that / which","who","where","whom"],"correctAnswer":0,"explanation":"'That' or 'which' is standard relative pronoun to define things or ideas."},{"id":4,"sentence":"The local food market ___ opens on Sundays sells organic grains.","verb":"thing","options":["which","who","where","whose"],"correctAnswer":0,"explanation":"'Which' introduces defining details on an inanimate noun."},{"id":5,"sentence":"The active neighbors ___ meet outside the library are friendly.","verb":"people","options":["who","which","where","whose"],"correctAnswer":0,"explanation":"Use 'who' for plural active human subjects."}]},"speaking":{"title":"Mini Lesson: A Mindful Routine Shift","difficulty":"B2","mode":"individual presentation","setup":"Students choose one habit: sleep routine, walking, meal planning, budgeting, reading, or reducing screen time.","timing":"Preparation: 5 minutes. Speaking: 2 minutes.","instructions":"Explain the habit, why you started it, what was difficult, and what changed.","followUp":["Would you recommend this habit to everyone?","What makes habits difficult to maintain?"],"targetLanguage":["I started because...","At first...","Gradually...","The biggest change was..."],"teachingNote":"Excellent for past tenses, sequencing, and reflection."},"writing":{"title":"Proposal: Neighborhood Wellness Event","difficulty":"B2","genre":"proposal","wordCount":"180-230 words","prompt":"Your school or workplace wants to organize a community wellness event. Write a proposal suggesting activities, explaining benefits, and mentioning possible challenges.","criteria":["Use appropriate headings to organize sections","Explain benefits clearly with action vocabulary","Address specific, practical challenges"],"teachingNote":"Useful for workplace/community English."}},{"id":10,"title":"Unit 10: Remote Work Variables","theme":"Provincial Moves & Life Boundaries","difficulty":"B2 CEFR","reading":{"title":"Working Remotely from a Smaller City","difficulty":"B2","focus":"inference, argument structure, detailed comprehension","text":"After two years of remote work, Ana moved from a capital city to a smaller coastal town. She expected lower rent and quieter mornings, and she found both. However, the change also affected her routine in unexpected ways. There were fewer professional events, and the internet was less reliable during storms. On the other hand, she spent less time commuting and more time cooking, exercising, and meeting neighbors. Ana says the move did not solve every problem, but it made her more aware of how location influences lifestyle. She now visits the capital once a month for meetings and cultural events, while keeping her daily life slower and less expensive.","questions":[{"id":1,"question":"Why did Ana relocate to a smaller town?","options":["She wanted a different lifestyle.","She lost her remote job.","She disliked coastal environments.","She needed a massive office room."],"correctAnswer":0,"explanation":"She expected lower rent, quieter mornings, and more time for wellness (a different lifestyle)."},{"id":2,"question":"The internet was always reliable in the coastal town.","options":["True","False"],"correctAnswer":1,"explanation":"The text says: 'the internet was less reliable during storms.'"},{"id":3,"question":"Which of these benefits is explicitly mentioned?","options":["More professional events","More time for cooking and exercise","An increase in commuting hours","Lower food costs"],"correctAnswer":1,"explanation":"The text notes: 'she spent less time commuting and more time cooking, exercising, and meeting neighbors.'"},{"id":4,"question":"Ana's holistic perspective on the move is best described as...","options":["balanced","completely negative","regretful only","uninterested"],"correctAnswer":0,"explanation":"She states the move didn't solve everything, but it made her aware of lifestyle variables, showing a balanced view."},{"id":5,"question":"Why does Ana visit the capital monthly?","options":["For client meetings and cultural events","To find a brand new apartment","To repair her home internet connection","For medical treatments"],"correctAnswer":0,"explanation":"The text says: 'She now visits the capital once a month for meetings and cultural events...'"}],"teachingNote":"Useful for B2 comparison and balanced opinion practice."},"listening":{"title":"Interview: Remote Work and Lifestyle Boundaries","difficulty":"B2","type":"Interview","script":[{"id":1,"speaker":"Interviewer","text":"You moved to a smaller city while keeping your remote job. Was it difficult?"},{"id":2,"speaker":"Guest","text":"In some ways, yes. I had to create clearer boundaries because my home became my office. At first, I worked longer hours because there was no commute to mark the end of the day."},{"id":3,"speaker":"Interviewer","text":"How did you solve that?"},{"id":4,"speaker":"Guest","text":"I started leaving the house for a short walk at six, even if I was not going anywhere special. It became a signal that work was over."},{"id":5,"speaker":"Interviewer","text":"Do you miss the capital?"},{"id":6,"speaker":"Guest","text":"Sometimes. I miss cultural events, but I don't miss the noise or the rent."}],"questions":[{"id":1,"question":"What problem did the guest encounter first after moving?","options":["Poor cellular signal","Working longer hours due to blurred boundaries","Noisy apartments","Difficulty communicating with their manager"],"correctAnswer":1,"explanation":"The guest mentions working longer hours because 'home became my office' and they had 'no commute to mark the end of the day.'"},{"id":2,"question":"What daily act does the guest perform at six o'clock?","options":["Cooks a healthy dinner","Goes for a short walk","Checks new messages","Does stretching exercises"],"correctAnswer":1,"explanation":"The guest started 'leaving the house for a short walk at six' to signal that work was over."},{"id":3,"question":"What aspects of the capital city does the guest miss?","options":["High rent costs","Noisy streets","Cultural events","Long commute hours"],"correctAnswer":2,"explanation":"The guest says: 'Sometimes. I miss cultural events...'"}],"preListening":"Students discuss advantages and disadvantages of remote work.","postListening":"Students give advice to a remote worker."},"vocabulary":{"title":"Essential B2 Lifestyle Collocations","difficulty":"B2","type":"sentence_completion","items":[{"phrase":"make a reservation","definition":"to arrange to keep a table, hotel room, or seat custom-booked","example":"We need to make a reservation for dinner."},{"phrase":"set boundaries","definition":"to set rules dividing work and personal life","example":"Remote workers must set boundaries."},{"phrase":"keep a routine","definition":"to maintain a regular set of daily habits","example":"It is helpful to keep a routine even on vacation."},{"phrase":"reduce stress","definition":"to lower feelings of continuous tension","example":"Stretching for five minutes helps reduce stress."},{"phrase":"miss a connection","definition":"to arrive late and fail to board a second vehicle","example":"If the train is delayed, we might miss a connection."},{"phrase":"save time","definition":"to accomplish tasks in less time","example":"Taking a taxi was expensive but it saved time."},{"phrase":"improve well-being","definition":"to make health and happiness better","example":"Eating vegetables helps improve well-being."},{"phrase":"face a challenge","definition":"to confront and deal with a difficult situation","example":"She expects to face a challenge during screen-free days."}],"matchingGame":[{"phrase":"make a reservation","definition":"to book a table, room, or ticket in advance"},{"phrase":"set boundaries","definition":"to declare limits dividing life aspects"},{"phrase":"keep a routine","definition":"to follow a regular morning habit set"},{"phrase":"reduce stress","definition":"to ease cognitive or physical tension"},{"phrase":"miss a connection","definition":"to arrive late for a continuing transit"},{"phrase":"save time","definition":"to use fewer minutes to finish something"},{"phrase":"improve well-being","definition":"to enhance general health and happiness"},{"phrase":"face a challenge","definition":"to confront a difficult circumstance"}],"teachingNote":"Useful for B2 comparison and balanced opinion practice."},"grammar":{"title":"Linking Words for B2 Answers","difficulty":"B2","focus":"Contrast, result, reason, and addition transitions","examples":["The city is expensive; however, it offers many opportunities.","I turned off notifications because they distracted me."],"questions":[{"id":1,"sentence":"The apartment was small; ___, it was very clean.","verb":"contrast","options":["however","because","therefore","although"],"correctAnswer":0,"explanation":"Use semicolon + 'however' + comma for showing contrast between two independent clauses."},{"id":2,"sentence":"I booked early ___ prices increase quickly.","verb":"reason","options":["because","however","therefore","in addition"],"correctAnswer":0,"explanation":"Use 'because' to introduce the physical cause or reason."},{"id":3,"sentence":"The train was canceled; ___, we took the bus to the wellness center.","verb":"result","options":["therefore","because","although","however"],"correctAnswer":0,"explanation":"Use 'therefore' to connect an event to its direct logical outcome or result."},{"id":4,"sentence":"___ the café was extremely crowded, the service was fast.","verb":"contrast","options":["Although","Because","Therefore","In addition"],"correctAnswer":0,"explanation":"Use 'Although' to introduce a subordinate concession clause."},{"id":5,"sentence":"The hotel has a luxury gym; ___, it offers healthy fresh food.","verb":"addition","options":["in addition","because","although","therefore"],"correctAnswer":0,"explanation":"Use 'in addition' (or 'moreover') to introduce supplementary points of information."}]},"speaking":{"title":"Persuade a Manager regarding Balance","difficulty":"B2","mode":"individual or pair role-play","setup":"Student speaks to a manager and proposes one lifestyle-friendly workplace change.","timing":"Preparation: 3 minutes. Speaking: 90 seconds.","instructions":"Persuade a manager to introduce one change: flexible hours, walking meetings, healthier cafeteria options, or no-meeting Friday afternoons. Give reasons and address one possible concern.","followUp":["What concern might the manager have?","How can you make your idea practical?"],"targetLanguage":["I'd like to suggest...","This would benefit...","I understand the concern, but...","A practical solution would be..."],"teachingNote":"This is close to MET persuasive speaking: position + reasons + audience awareness."},"writing":{"title":"Argumentative Essay: Lifestyle & Tech","difficulty":"B2","genre":"argumentative essay","wordCount":"200-250 words","prompt":"Technology has made modern life more convenient, but not necessarily healthier. To what extent do you agree? Include a counterargument and examples.","criteria":["Develop a clear, consistent argument throughout","Include and answer a solid counterargument","Use realistic illustrative examples from daily routines"],"teachingNote":"Final writing task; assess coherence, paragraphing, and range."}}],"levelUp":[{"id":1,"unitId":1,"b1Sentence":"I want a quiet room because I have an important meeting tomorrow morning.","b2Goal":"Upgrade with formal request constructs, precise adjectives, and causal transitions.","b1Critique":"Uses basic demand phrasing ('I want'), generic adjectives ('important', 'quiet'), and standard conjunction ('because').","targetKeywords":[{"word":"highly appreciate","equivalent":"want","reason":"Softens the direct demand into a professional guest request."},{"word":"tranquil","equivalent":"quiet","reason":"A more sophisticated adjective indicating peaceful quietness."},{"word":"given that","equivalent":"because","reason":"An advanced subordinate conjunction to introduce a known premise."}],"options":[{"text":"I want a quiet room since I have a very important meeting tomorrow morning.","level":"B1","explanation":"Too informal. Swapping 'because' for 'since' is a minor lift, but 'I want' and 'important' remain basic."},{"text":"I would highly appreciate a tranquil room, given that I have an indispensable meeting scheduled for tomorrow morning.","level":"B2 (Correct)","explanation":"Excellent! 'Highly appreciate' is polite, 'tranquil' elevates 'quiet', and 'given that' is an elegant causal transition."},{"text":"I need a silent room tomorrow morning because my meeting is very important.","level":"B2 (Incorrect)","explanation":"Awkward expression. 'I need' is still demanding and 'very important' is repetitive."}],"correctOptionIndex":1,"c1AdvancedAlternative":"Should it be feasible, I would highly appreciate being assigned a tranquil room, given that I am hosting an indispensable online summit early tomorrow morning.","sentenceInversionHint":"Try beginning with: 'Given that...' or 'Should it be feasible, I would highly appreciate...'"},{"id":2,"unitId":1,"b1Sentence":"The hotel is nice, but it is too far from the city center.","b2Goal":"Use concessive structures ('although', 'albeit') and descriptive distance terms.","b1Critique":"Relies on the weak adjective 'nice', basic contrastive coordinating conjunction 'but', and simple adverb 'too far'.","targetKeywords":[{"word":"pleasant","equivalent":"nice","reason":"Adds refinement and avoids the overused, generic adjective 'nice'."},{"word":"albeit","equivalent":"but","reason":"A high-level B2/C1 conjunction meaning 'though' or 'even though'."},{"word":"somewhat inconvenient","equivalent":"too far","reason":"Expresses dissatisfaction with professional restraint."}],"options":[{"text":"The hotel is pleasant, albeit its distance from the city center is somewhat inconvenient.","level":"B2 (Correct)","explanation":"Superb! Uses 'pleasant' to replace 'nice', the elegant conjunction 'albeit' for contrast, and a nuanced description of the distance."},{"text":"The hotel is fine but it is located very far away from the town center.","level":"B1","explanation":"Too elementary. 'Fine' and 'very far away' lack CEFR B2 textuur."},{"text":"The hotel is nice but indeed far from the center where everything is.","level":"B2 (Incorrect)","explanation":"A bit conversational and circular. Doesn't reach professional written or spoken standard."}],"correctOptionIndex":0,"c1AdvancedAlternative":"Although the establishment is undoubtedly pleasant, its geographic isolation from the metropolitan core is somewhat inconvenient for my schedule.","sentenceInversionHint":"Try beginning with: 'Although the establishment is...'"},{"id":3,"unitId":2,"b1Sentence":"Give me a coffee with oat milk and without sugar because I am on a diet.","b2Goal":"Use polite hedging triggers, professional verbs, and healthier lifestyle phrasing.","b1Critique":"The imperative 'Give me' is excessively blunt. 'On a diet' is colloquial; 'monitor intake' is more analytical.","targetKeywords":[{"word":"Could I please request","equivalent":"Give me","reason":"Standard hospitable request framing."},{"word":"exclude","equivalent":"without","reason":"Active professional verb instead of a simple preposition."},{"word":"monitoring my sugar intake","equivalent":"on a diet","reason":"A polished, modern way to refer to dietary restrictions."}],"options":[{"text":"Please give me oat milk coffee with no sugar because I am doing a diet.","level":"B1","explanation":"Uses incorrect collocation ('doing a diet') and keeps the direct command 'Please give me'."},{"text":"I'd like a coffee with oat milk and please exclude the sugar, as I am currently monitoring my sugar intake.","level":"B2 (Correct)","explanation":"Terrific! Polite modal request combined with 'exclude' and 'monitoring sugar intake' sounds very professional."},{"text":"Give me oat-milk coffee, no sugar because I must follow strict diet rules.","level":"B2 (Incorrect)","explanation":"Too aggressive and jerky in pace. Lacks smooth English cohesion."}],"correctOptionIndex":1,"c1AdvancedAlternative":"Could I please request an oat-milk coffee with sugar completely excluded, as I am currently monitoring my glycemic intake?","sentenceInversionHint":"Try: 'As I am currently monitoring my intake, I would like to request...'"},{"id":4,"unitId":2,"b1Sentence":"This café is always busy, so we should find another place to talk.","b2Goal":"Integrate continuous adverbs, replace 'place' with 'venue', and elevate 'talk'.","b1Critique":"Overuses basic 'always', simple 'busy' adjective, and highly repetitious nouns like 'place'.","targetKeywords":[{"word":"consistently crowded","equivalent":"always busy","reason":"More precise description of patron frequency."},{"word":"alternative venue","equivalent":"another place","reason":"Using formal business nouns instead of high-frequency words."},{"word":"conduct our conversation","equivalent":"talk","reason":"Formally frames a discussion as a polite action."}],"options":[{"text":"Because this cafe is very busy, we need to go to another spot to speak.","level":"B1","explanation":"Simply swaps words for basic synonyms without improving sentence structure."},{"text":"This cafe is consistently crowded, so it would be wiser to seek an alternative venue to conduct our conversation.","level":"B2 (Correct)","explanation":"Excellent! 'Consistently crowded', 'alternative venue', and 'conduct our conversation' are premium lexical choices."},{"text":"This coffee shop is full, hence we should find an outdoor location to talk together.","level":"B2 (Incorrect)","explanation":"Though 'hence' is formal, the ending remains casual with 'find a location to talk together'."}],"correctOptionIndex":1,"c1AdvancedAlternative":"Given that this establishment is consistently crowded, it would be highly advisable to seek an alternative venue to conduct our discussion in peace.","sentenceInversionHint":"Begin with a participial or causal clause: 'Given that this establishment is consistently crowded...'"},{"id":5,"unitId":3,"b1Sentence":"If you miss the fast train, you will arrive very late for the conference.","b2Goal":"Utilize conditional inversions without 'if' ('should you'), and advanced adverbs.","b1Critique":"The first conditional with 'if' is standard B1. We can elevate formatting by making it a formal warning.","targetKeywords":[{"word":"Should you miss","equivalent":"If you miss","reason":"An inversion that replaces 'if' with auxiliary auxiliary 'should' for high-level conditional stance."},{"word":"express train","equivalent":"fast train","reason":"The correct transportation terminology."},{"word":"risk arriving significantly late","equivalent":"will arrive very late","reason":"Softens certainty to a professional threat risk, while upgrading 'very late'."}],"options":[{"text":"If you do not catch the speed train, you're going to be extremely late for the meeting.","level":"B1","explanation":"Informal. Swaps with basic contraction ('you're') and wrong terminology ('speed train')."},{"text":"Should you miss the express train, you risk arriving significantly late for the conference.","level":"B2 (Correct)","explanation":"Masterful! Using inverted conditional ('Should you miss') is a signature of C1/Advanced fluency, paired with 'significantly'."},{"text":"Missing the fast train means you are surely arriving late for the scientific conference.","level":"B2 (Incorrect)","explanation":"Gerund start is better, but 'surely arriving late' lacks the academic tone of 'significantly late'."}],"correctOptionIndex":1,"c1AdvancedAlternative":"Should you fail to board the express train, you run the distinct risk of arriving significantly late for the conference opening.","sentenceInversionHint":"Ditch 'if' completely and search for 'Should you...'"},{"id":6,"unitId":3,"b1Sentence":"I got lost in the subway because there are not many signs.","b2Goal":"Use passive verbs, replace 'lost' with 'disoriented', and nominalize 'there are not many signs'.","b1Critique":"Colloquial 'got lost' and basic cause transition 'because there are not many...'.","targetKeywords":[{"word":"became disoriented","equivalent":"got lost","reason":"Scientific, precise alternative explaining disorientation."},{"word":"due to a lack of","equivalent":"because there are not many","reason":"Prepositional nominalizer indicating systemic absence."},{"word":"clear signage","equivalent":"signs","reason":"Professional structural collective noun for signs."}],"options":[{"text":"I became disoriented in the subway terminal due to a lack of clear signage.","level":"B2 (Correct)","explanation":"Fantastic! 'Became disoriented', 'due to a lack of' and 'signage' fit B2/C1 specifications."},{"text":"I got lost inside the underground station because the signs are small and few.","level":"B1","explanation":"Weak and repetitive. Still relies on basic 'got lost' and basic adjectives."},{"text":"Having no indicators, I lost my way in the huge subway transport system.","level":"B2 (Incorrect)","explanation":"Slightly poetic but less natural for an professional traveler overview."}],"correctOptionIndex":0,"c1AdvancedAlternative":"I became thoroughly disoriented within the subterranean hub, which I attribute primarily to an absolute dearth of legible signage.","sentenceInversionHint":"Try starting with: 'I attribute my disorientation in the subway to...'"},{"id":7,"unitId":4,"b1Sentence":"We need to talk about this problem before we start the project.","b2Goal":"Inject subjunctive structures ('it is crucial that we...'), and verbs like 'address' and 'initiate'.","b1Critique":"Uses high-frequency 'need to talk', basic collision noun 'problem', and basic start verbs.","targetKeywords":[{"word":"crucial that we address","equivalent":"need to talk about","reason":"Subjunctive mandate for urgent focus."},{"word":"issue","equivalent":"problem","reason":"A professional business alternative that sounds constructive."},{"word":"prior to initiating","equivalent":"before we start","reason":"Formal replacement for basic chronological prepositions."}],"options":[{"text":"We must speak of this bad thing before launching the project action.","level":"B1","explanation":"Uses basic structures and awkward wording like 'bad thing' and 'project action'."},{"text":"It is crucial that we address this issue prior to initiating the project.","level":"B2 (Correct)","explanation":"Incredible! 'Crucial that we address' uses the subjunctive correctly. 'Prior to initiating' is flawless."},{"text":"It is very important that we talk about this obstacle before writing the project plan.","level":"B2 (Incorrect)","explanation":"'Very important' and 'talk about' are still quite intermediate."}],"correctOptionIndex":1,"c1AdvancedAlternative":"It is imperative that we thoroughly address this underlying issue prior to the official initiation of the project.","sentenceInversionHint":"Start with an assertive subjective adjective phrase: 'It is imperative that we...'"},{"id":8,"unitId":5,"b1Sentence":"I clean my room every Saturday so that it looks good.","b2Goal":"Nominalize goals, swap 'clean' for 'tidy', and introduce 'aesthetic' or 'organized'.","b1Critique":"Elementary coordinate 'so that it looks good' and basic transitive verb 'clean'.","targetKeywords":[{"word":"tidy","equivalent":"clean","reason":"Refers specifically to organization and tidiness."},{"word":"maintain","equivalent":"so that it looks","reason":"Action verb representing ongoing state custody."},{"word":"organized living space","equivalent":"looks good","reason":"Polished and descriptive compound noun."}],"options":[{"text":"I tidy my room every Saturday to maintain a clean and organized living space.","level":"B2 (Correct)","explanation":"Spot on! Relplaces 'clean... so that' with an elegant infinitive of purpose 'to maintain a clean and organized living space'."},{"text":"I clean up my bedroom each Saturday so that my style is nice.","level":"B1","explanation":"Still very juvenile. 'Nice style' doesn't match B2 parameters."},{"text":"Every Saturday, I sweep my domestic room for having an eye-friendly apartment.","level":"B2 (Incorrect)","explanation":"Awkward or over-embellished language ('domestic room', 'eye-friendly') that sounds unnatural."}],"correctOptionIndex":0,"c1AdvancedAlternative":"I dedicate Saturday mornings to tidying my quarters, a ritual aimed at maintaining an aesthetically pleasing and highly organized living space.","sentenceInversionHint":"Try ending your rewrite with: '...to maintain an organized living space.'"},{"id":9,"unitId":6,"b1Sentence":"I like cycling in the park because it helps me relax after work.","b2Goal":"Elevate preference indicators ('thoroughly enjoy'), and replace 'help me relax' with an outlet concept.","b1Critique":"Repeated basic preference verb 'like' and high-frequency 'helps me relax'.","targetKeywords":[{"word":"thoroughly enjoy","equivalent":"like","reason":"Adds intensity and emotional nuance to verbs."},{"word":"serves as an excellent outlet","equivalent":"helps me","reason":"A sophisticated idiom describing functional relief."},{"word":"relieving post-work stress","equivalent":"relax after work","reason":"Professional psychological noun phrasing."}],"options":[{"text":"I like riding bikes in the green park as it works for relaxing my brain after labor.","level":"B1","explanation":"Awkward vocabulary choices ('relaxing my brain', 'after labor') and basic grammar are stored."},{"text":"I thoroughly enjoy cycling in the park, as it serves as an excellent outlet for relieving post-work stress.","level":"B2 (Correct)","explanation":"Brilliant! This structure is cohesive, uses advanced prepositions ('as it serves as'), and upgraded lexical items."},{"text":"Riding a bike in the park is good for me because I can forget work problems.","level":"B2 (Incorrect)","explanation":"Very colloquial. 'Forget work problems' lacks academic or professional polish."}],"correctOptionIndex":1,"c1AdvancedAlternative":"I thoroughly enjoy traversing the local park by bicycle, as this activity serves as a vital outlet for releasing accumulated post-work tension.","sentenceInversionHint":"Try incorporating: '...serves as an invaluable outlet for...'"},{"id":10,"unitId":7,"b1Sentence":"This dish tastes nice because it has fresh herbs in it.","b2Goal":"Use sensory nouns ('flavor profile'), and explain cause using 'largely owing to'.","b1Critique":"Basic active verb 'tastes nice', generic pronoun 'it has', and lazy causal link 'because'.","targetKeywords":[{"word":"exceptional flavor profile","equivalent":"tastes nice","reason":"Advanced gastronomic vocabulary characterizing food quality."},{"word":"largely owing to","equivalent":"because it has","reason":"High-level prepositional synonym for 'due to' or 'because of'."},{"word":"incorporation of","equivalent":"in it","reason":"Refined noun form of 'including' or 'having'."}],"options":[{"text":"This dish has an exceptional flavor profile, largely owing to the incorporation of fresh herbs.","level":"B2 (Correct)","explanation":"Correct! 'Exceptional flavor profile' is culinary, and 'largely owing to the incorporation...' shows mastery of complex structures."},{"text":"This dish is tasting great because of the many fresh greens placed inside it.","level":"B1","explanation":"Using continuous tense ('is tasting great') is structurally weak in this context, and 'greens inside it' is basic."},{"text":"The meal has a delicious nature, thanks to the green plants mixed in.","level":"B2 (Incorrect)","explanation":"'Delicious nature' and 'green plants mixed in' are clumsy conversions."}],"correctOptionIndex":0,"c1AdvancedAlternative":"This culinary creation boasts an exceptional flavor profile, attributable in large part to the deliberate incorporation of freshly harvested herbs.","sentenceInversionHint":"Try beginning with: 'The exceptional flavor profile of this dish is...'"},{"id":11,"unitId":8,"b1Sentence":"My computer is slow, and I don't know what to do.","b2Goal":"Upgrade tech performance terms, and use indirect questions with 'unsure how to resolve'.","b1Critique":"Vague adjective 'slow', coordination 'and', and raw distress 'I don't know what to do'.","targetKeywords":[{"word":"significantly degraded","equivalent":"slow","reason":"Technical descriptor regarding system speed bottlenecks."},{"word":"unsure how to resolve","equivalent":"don't know what to do","reason":"Professional, solution-oriented statement."},{"word":"underlying issue","equivalent":"what is wrong","reason":"Diagnostic language for tech troubleshooting."}],"options":[{"text":"My PC is working very badly and I cannot fix the error myself.","level":"B1","explanation":"Informal, diagnostic-deficient and lacking professional nuance."},{"text":"My computer's performance is significantly degraded, and I am unsure how to resolve the underlying issue.","level":"B2 (Correct)","explanation":"Splendid! Uses possessive nominalization ('performance'), precise adjective ('significantly degraded'), and a polite indirect clause."},{"text":"The operating speed is down, and I am lost about doing a repair.","level":"B2 (Incorrect)","explanation":"Grammatically awkward. Tech support contexts expect 'performance' and 'resolve'."}],"correctOptionIndex":1,"c1AdvancedAlternative":"My workstation’s processing performance has witnessed a significant degradation, leaving me thoroughly perplexed as to how to remedy the technical bottleneck.","sentenceInversionHint":"Try: 'With my workstation's performance significantly degraded, I am...'"},{"id":12,"unitId":9,"b1Sentence":"We must protect these plants so they don't die.","b2Goal":"Deploy passive modal duties ('it is vital to'), and swap 'plants don't die' for 'prevent extinction'.","b1Critique":"The mandate 'We must' is repetitive. 'Save plants so they don't die' is flat; 'conserve species' is ecological.","targetKeywords":[{"word":"vital to conserve","equivalent":"must protect","reason":"Academic obligation adjective to emphasize preservation."},{"word":"endangered species","equivalent":"plants","reason":"Crucial scientific biology jargon."},{"word":"prevent their extinction","equivalent":"so they don't die","reason":"Refined biological conclusion clause."}],"options":[{"text":"It is vital to conserve these endangered species to prevent their extinction.","level":"B2 (Correct)","explanation":"Brilliant! Directly substitutes ecological concepts ('conserve', 'endangered species', 'extinction') to create an scientific thesis sentence."},{"text":"We need to keep these green flora alive so that we avoid their deaths.","level":"B1","explanation":"'Keep flora alive' and 'avoid their deaths' sound amateurish and unscientific."},{"text":"Safeguarding these botanical items is necessary so they don't cease to exist.","level":"B2 (Incorrect)","explanation":"Better, but the phrasing 'botanical items' and 'don't cease to exist' is slightly robotic."}],"correctOptionIndex":0,"c1AdvancedAlternative":"It is of paramount importance that we actively conserve these fragile floral species to mitigate the immediate risk of extinction.","sentenceInversionHint":"Start with high urgency: 'It is of paramount importance that we...'"},{"id":13,"unitId":10,"b1Sentence":"I think this painting is beautiful and makes me feel happy.","b2Goal":"Abolish 'I think', swap 'beautiful' for 'exquisite', and use emotive transit verbs like 'evoking'.","b1Critique":"Overuses high-frequency filter 'I think', simple adjective 'beautiful', and basic 'makes me feel happy'.","targetKeywords":[{"word":"truly exquisite","equivalent":"beautiful","reason":"Strong artistic adjective denoting flawless aesthetic craftsmanship."},{"word":"evoking a profound sense","equivalent":"makes me feel","reason":"Action verb representing emotional invocation."},{"word":"uplifted","equivalent":"happy","reason":"Specific positive emotional adjective."}],"options":[{"text":"This artwork is truly exquisite, evoking a profound sense of joy and leaving me feeling utterly uplifted.","level":"B2 (Correct)","explanation":"Masterpiece! Excludes 'I think', transforms 'beautiful' into 'exquisite', uses 'evoking a profound sense' and high-level mood descriptors."},{"text":"To my view, this painting is extremely pretty, giving me a happy energy.","level":"B1","explanation":"Lacks critical vocabulary. 'Happy energy' and 'extremely pretty' are grammatically elementary."},{"text":"I find that this visual canvas is gorgeous, which causes me to be happy.","level":"B2 (Incorrect)","explanation":"The ending clause 'causes me to be happy' is clinical and unpolished."}],"correctOptionIndex":0,"c1AdvancedAlternative":"This striking canvas is demonstrably exquisite, evoking a profound sense of tranquility while engendering an uplifted state of mind.","sentenceInversionHint":"Refuse the urge to state 'I outline' or 'I believe'; start directly with the subject."}],"vocabularySwapper":[{"id":1,"unitId":1,"sentence":"We made a [booking] at the hotel, so we waited in the [front lobby] and asked if a [silent room] was [ready/free].","targets":[{"simpleWord":"booking","correctWord":"reservation","options":["reservation","reception","key card","lobby"],"explanation":"A 'reservation' is the professional noun for a confirmed booking of accommodation."},{"simpleWord":"front lobby","correctWord":"reception","options":["reception","elevator","key card","lobby"],"explanation":"The 'reception' (or front desk) is the specific desk area where staff manage arrivals."},{"simpleWord":"silent room","correctWord":"quiet room","options":["quiet room","lobby","available","included"],"explanation":"'Quiet room' is the targeted hospitality term representing calm, soundproof space."},{"simpleWord":"ready/free","correctWord":"available","options":["available","included","lobby","key card"],"explanation":"'Available' means free and vacant for immediate occupancy."}]},{"id":2,"unitId":2,"sentence":"Our [landlord] sent clear instructions, and she highly [suggests] checking out the [surrounding area].","targets":[{"simpleWord":"landlord","correctWord":"host","options":["host","critic","review","balcony"],"explanation":"In short-stay apartment rentals, the landlord is referred to as the 'host' or operator."},{"simpleWord":"suggests","correctWord":"recommends","options":["recommends","noisy","windows","condition"],"explanation":"'Recommends' is a more professional and active alternative to 'suggests'."},{"simpleWord":"surrounding area","correctWord":"neighborhood","options":["neighborhood","balcony","condition","location"],"explanation":"'Neighborhood' is the noun identifying the local community and nearby surrounding streets."}]},{"id":3,"unitId":3,"sentence":"I had to buy a [ticket] at the [station] because I was worried about [missing] the fast train.","targets":[{"simpleWord":"ticket","correctWord":"fare","options":["fare","platform","delay","passenger"],"explanation":"'Fare' specifically designates the ticket price or cost paid to travel on transit."},{"simpleWord":"station","correctWord":"terminal","options":["terminal","platform","luggage","announcement"],"explanation":"A high-speed train or transport hub is referred to as a transit 'terminal'."},{"simpleWord":"missing","correctWord":"delaying","options":["delaying","boarding","departure","canceling"],"explanation":"'Delaying' or missing is related to schedule setbacks."}]},{"id":4,"unitId":4,"sentence":"During the [meeting], we discussed the [work plan] and reviewed our [duties].","targets":[{"simpleWord":"meeting","correctWord":"briefing","options":["briefing","agenda","colleague","deadline"],"explanation":"A focused corporate meeting to outline tasks is specifically labeled a 'briefing'."},{"simpleWord":"work plan","correctWord":"agenda","options":["agenda","feedback","workplace","presentation"],"explanation":"The official program or list of meeting items to be addressed is the 'agenda'."},{"simpleWord":"duties","correctWord":"responsibilities","options":["responsibilities","colleagues","feedbacks","deadlines"],"explanation":"'Responsibilities' sounds much more analytical and professional in reviews than simple 'duties'."}]},{"id":5,"unitId":5,"sentence":"I always [do] my bed and try to [keep] my room clean to establish a good [habit].","targets":[{"simpleWord":"do","correctWord":"make","options":["make","dust","sweep","tidy"],"explanation":"The correct verb collocation for organizing bedding is 'to make your bed'."},{"simpleWord":"keep","correctWord":"maintain","options":["maintain","sweep","dust","fold"],"explanation":"'Maintain' is an elevated verb meaning to keep a state or house in proper condition."},{"simpleWord":"habit","correctWord":"routine","options":["routine","chore","alarm","laundry"],"explanation":"A structured daily workflow is professionally called a 'routine'."}]},{"id":6,"unitId":6,"sentence":"The tour has a [quiet] route, but participants must wear safety [gear] and follow cycling [habits].","targets":[{"simpleWord":"quiet","correctWord":"relaxed","options":["relaxed","residential","refunded","dangerous"],"explanation":"'Relaxed' replaces boring 'quiet' to convey low-stakes, simple, leisurely pacing."},{"simpleWord":"gear","correctWord":"helmets","options":["helmets","guides","routes","benefits"],"explanation":"The specific protective gear provided for heads is 'helmets'."},{"simpleWord":"habits","correctWord":"routines","options":["routines","benefits","stretches","parks"],"explanation":"'Routines' is the higher-level word representing habitual exercises and daily flows."}]},{"id":7,"unitId":7,"sentence":"This dish has [healthy] parts, and the restaurant [makes sure] to use [local] ingredients.","targets":[{"simpleWord":"healthy","correctWord":"nutritious","options":["nutritious","fresh","delicious","traditional"],"explanation":"'Nutritious' is an excellent academic upgrade for generic 'healthy' food descriptors."},{"simpleWord":"makes sure","correctWord":"guarantees","options":["guarantees","prepares","includes","serves"],"explanation":"'Guarantees' is an active business verb offering pledge or absolute assurance."},{"simpleWord":"local","correctWord":"locally sourced","options":["locally sourced","traditional","homemade","organic"],"explanation":"'Locally sourced' is the advanced food sector vocabulary for goods procured near the shop."}]},{"id":8,"unitId":8,"sentence":"To resolve the computer [problem], I had to [follow] the guide step-by-step and [restart] the system.","targets":[{"simpleWord":"problem","correctWord":"issue","options":["issue","software","hardware","screen"],"explanation":"In tech support, generic problems are formally called 'issues' or 'anomalies'."},{"simpleWord":"follow","correctWord":"execute","options":["execute","reinstall","connect","install"],"explanation":"'Execute' is a premium verb for running or carrying out a set of standard instructions."},{"simpleWord":"restart","correctWord":"reboot","options":["reboot","reinstall","connect","install"],"explanation":"'Reboot' is the specific hardware-level terminology for restarting computer components."}]},{"id":9,"unitId":9,"sentence":"The nature reserve is [famous] for protecting [animal] species that live in this beautiful [place].","targets":[{"simpleWord":"famous","correctWord":"renowned","options":["renowned","protected","local","threatened"],"explanation":"'Renowned' is a high-level CEFR adjective representing being widely known and celebrated."},{"simpleWord":"animal","correctWord":"wildlife","options":["wildlife","botanical","ecosystem","nature"],"explanation":"'Wildlife' covers all non-domesticated flora and fauna living in natural habitat ranges."},{"simpleWord":"place","correctWord":"habitat","options":["habitat","conservation","reserve","ecosystem"],"explanation":"'Habitat' is the precise ecological definition for the environmental home of a species."}]},{"id":10,"unitId":10,"sentence":"The art [show] displayed [amazing] modern works that express the artist's [ideas].","targets":[{"simpleWord":"show","correctWord":"exhibition","options":["exhibition","vernissage","sculpture","painting"],"explanation":"An official curated presentation of artistic works is called an 'exhibition'."},{"simpleWord":"amazing","correctWord":"provocative","options":["provocative","exquisite","contemporary","striking"],"explanation":"'Provocative' means causing thought, discussion, or strong responses — highly useful for art descriptors."},{"simpleWord":"ideas","correctWord":"perspective","options":["perspective","technique","vernissage","tradition"],"explanation":"The intellectual framing, outlook, or worldview of an artist is their 'perspective'."}]}],"grammarDoctor":[{"id":1,"unitId":1,"focus":"Present Simple vs Present Continuous","symptom":"I am usually having breakfast at my hotel, but this week I eat in local cafés.","highlightedBug":"am usually having ... eat","errorType":"Aspect Confusion (Habitual vs. Temporary)","diagnosticExplanation":"Habitual routines ('usually') require the Present Simple, while temporary situations running around now ('this week') require the Present Continuous.","remedyOptions":[{"text":"I usually have breakfast at my hotel, but this week I am eating in local cafés.","isCorrect":true,"explanation":"Perfect! 'I usually have' correctly denotes habit, and 'I am eating' describes a temporary event."},{"text":"I am usually having breakfast at my hotel, but this week I am eating in local cafés.","isCorrect":false,"explanation":"Incorrect. The first verb still uses the progressive aspect for a habitual routine."},{"text":"I usually have breakfast at my hotel, but this week I eat in local cafés.","isCorrect":false,"explanation":"Incorrect. The second verb uses the Present Simple for a temporary event indicating 'this week'."}],"linguisticRule":"Do not confuse state/habits with temporary actions. Adverbs of frequency (usually, often, always) trigger Present Simple. Limited duration markers (this week, currently, today) trigger Present Continuous."},{"id":2,"unitId":2,"focus":"Past Simple vs Past Continuous","symptom":"While I walked down the street yesterday, it was starting to rain heavily.","highlightedBug":"walked ... was starting","errorType":"Tense Aspect Swap","diagnosticExplanation":"Long continuous background actions ('walking') require the Past Continuous, while sudden, short completed actions that interrupt them require the Past Simple.","remedyOptions":[{"text":"While I was walking down the street yesterday, it was starting to rain heavily.","isCorrect":false,"explanation":"Incorrect. Both tenses are now continuous, which makes the sudden rain sound like a background state rather than an interruptive event."},{"text":"While I walked down the street yesterday, it started to rain heavily.","isCorrect":false,"explanation":"Incorrect. Using simple past for both lacks relative depth, failing to contextualize the continuous backdrop of your walk."},{"text":"While I was walking down the street yesterday, it started to rain heavily.","isCorrect":true,"explanation":"Excellent! 'Was walking' establishes the active background scene, and 'started' registers the sudden past interruption."}],"linguisticRule":"Use Past Continuous (was/were + -ing) for background activities that were in progress. Use Past Simple for the sudden events that broke into or interrupted that backdrop."},{"id":3,"unitId":3,"focus":"Irregular and Double Comparatives","symptom":"Taking the train is much more faster than flying, but it is also more expensiver.","highlightedBug":"more faster ... more expensiver","errorType":"Double Comparative Suffixing","diagnosticExplanation":"Short adjective comparatives (fast ➔ faster) should never be preceded by 'more'. Long adjectives (expensive) should use 'more' but never receive the '-er' suffix.","remedyOptions":[{"text":"Taking the train is much faster than flying, but it is also more expensive.","isCorrect":true,"explanation":"Flawless! 'Faster' is a single-syllable comparative adjective, and 'more expensive' is correct for a three-syllable adjective."},{"text":"Taking the train is much more fast than flying, but it is also expensiver.","isCorrect":false,"explanation":"Incorrect. 'More fast' is structurally weak and 'expensiver' is grammatically non-existent."},{"text":"Taking the train is much faster than flying, but it is also expensivist.","isCorrect":false,"explanation":"Incorrect. 'Expensivist' is a made-up superlative form rather than a comparative term."}],"linguisticRule":"1-syllable adjectives take '-er' (smaller, faster). 3+ syllable adjectives take 'more' (more comfortable, more expensive). Never combine both on a single word."},{"id":4,"unitId":4,"focus":"Modals of Prohibitions and Obligations","symptom":"You don't have to park here; there is a strict 'No Parking' sign and you will get a fine.","highlightedBug":"don't have to","errorType":"Incorrect Modal Selection","diagnosticExplanation":"'Don't have to' means there is no obligation (it is optional), whereas 'must not' is mandatory prohibition (forbidden by law or strict rules).","remedyOptions":[{"text":"You shouldn't have to park here; there is a strict 'No Parking' sign.","isCorrect":false,"explanation":"Incorrect. 'Shouldn't have to' is advice regarding personal obligation rather than an absolute ban."},{"text":"You must not park here; there is a strict 'No Parking' sign and you will get a fine.","isCorrect":true,"explanation":"Exactly! 'Must not' expresses strong, legally enforced prohibition. To park here is forbidden."},{"text":"You needn't park here; there is a strict 'No Parking' sign and you will get a fine.","isCorrect":false,"explanation":"Incorrect. 'Needn't' means lack of necessity, which means you are still technically allowed to if you wish."}],"linguisticRule":"Use 'must not / mustn't' to signal strict rules, laws, and things that are completely forbidden. Use 'don't have to / needn't' when an action is optional or unnecessary."},{"id":5,"unitId":5,"focus":"Present Perfect vs Past Simple","symptom":"I have lived in this apartment since three years, and I key-unlocked the door yesterday.","highlightedBug":"since three years","errorType":"Prepositional Timeline Drift","diagnosticExplanation":"'Since' denotes a specific starting point in the past (e.g., since 2023), whereas 'for' is used to measure a duration or length of time (e.g., for three years).","remedyOptions":[{"text":"I have lived in this apartment since yesterday, and I have key-unlocked the door.","isCorrect":false,"explanation":"Incorrect. While grammatically correct in isolation, this changes the timeline of 'yesterday' into a present-result aspect."},{"text":"I live in this apartment for three years, and I key-unlocked the door yesterday.","isCorrect":false,"explanation":"Incorrect. Simple present 'live' cannot capture an ongoing action spanning three years to the present."},{"text":"I have lived in this apartment for three years, and I unlocked the door yesterday.","isCorrect":true,"explanation":"Superb! Use 'for' for duration (three years) with Present Perfect, and past simple for the simple action ('unlocked') yesterday."}],"linguisticRule":"Specify duration using 'for' + length of time (for 5 days, for 3 years). Specify starting boundaries with 'since' + point in time (since Monday, since 2018)."},{"id":6,"unitId":6,"focus":"Second Conditionals","symptom":"If I have more leisure time, I would cycle around the national park every single day.","highlightedBug":"have ... would cycle","errorType":"Mixed Conditional Chaos","diagnosticExplanation":"A hypothetical, imaginary present situation (indicated by 'would cycle') requires the Second Conditional structure: 'If' + Past Simple, followed by 'would' + Verb Infinitive.","remedyOptions":[{"text":"If I will have more leisure time, I would cycle around the national park.","isCorrect":false,"explanation":"Incorrect. In English, you never place 'will' directly in the conditional 'if' clause."},{"text":"If I had more leisure time, I would cycle around the national park every single day.","isCorrect":true,"explanation":"Outstanding! Second conditional uses simple past 'had' inside the 'if' clause to express a speculative present premise."},{"text":"If I had more leisure time, I will cycle around the national park.","isCorrect":false,"explanation":"Incorrect. Blends past conditional premise ('had') with futuristic certain result ('will')."}],"linguisticRule":"Form the Second Conditional with: If + Past Simple ➔ would + Base Verb. This frames current hypothetical or counterfactual setups in standard CEFR."},{"id":7,"unitId":7,"focus":"Passive Voice Structure","symptom":"The traditional Italian dish was prepare beautifully by the chef during the vernissage.","highlightedBug":"was prepare","errorType":"Missing Past Participle","diagnosticExplanation":"Passive sentences are formed using 'be' + Past Participle. 'Prepare' must be conjugated to its participial form 'prepared'.","remedyOptions":[{"text":"The traditional Italian dish went prepared beautifully by the chef.","isCorrect":false,"explanation":"Incorrect. Avoid replacing 'be' with auxiliary 'go' in standard, formal academic translations."},{"text":"The traditional Italian dish was preparing beautifully by the chef.","isCorrect":false,"explanation":"Incorrect. The progressive participle 'preparing' implies the dish was actively doing the preparation itself."},{"text":"The traditional Italian dish was prepared beautifully by the chef during the vernissage.","isCorrect":true,"explanation":"Excellent! 'Was' (past tense of be) + 'prepared' (past participle) represents passive voice correctly."}],"linguisticRule":"Form passive voice via: Object + [Conjugated Be] + Past Participle (V3). Ensure the participle agrees, e.g. was taken, were built, is known."},{"id":8,"unitId":8,"focus":"Gerunds vs Infinitives","symptom":"She decided planning an upgrade, but she completely forgot calling the reception.","highlightedBug":"planning ... calling","errorType":"Verb Complement Mismatch","diagnosticExplanation":"The verb 'decide' is only followed by an infinitive (to plan). The verb 'forget' can take a gerund for memory, but for a task omission, it must be the infinitive (to call).","remedyOptions":[{"text":"She decided to plan an upgrade, but she completely forgot calling the reception.","isCorrect":false,"explanation":"Incorrect. 'Forgot calling' means she does not remember doing the call in her memory, which isn't the intended task omission."},{"text":"She decided to plan an upgrade, but she completely forgot to call the reception.","isCorrect":true,"explanation":"Outstanding choice! 'Decided to plan' and 'forgot to call' are grammatically precise for decisions and forgotten obligations."},{"text":"She decided planning an upgrade, but she forgot to call the reception.","isCorrect":false,"explanation":"Incorrect. The first verb complement 'decided planning' is still ungrammatical."}],"linguisticRule":"Certain verbs require an infinitive complement (decide, refuse, manage, promise). Others require a gerund (enjoy, avoid, practice, suggest)."},{"id":9,"unitId":9,"focus":"Relative Clauses","symptom":"I met a tour guide which explained us the historical significance of the flora.","highlightedBug":"which ... explained us","errorType":"Relative Pronoun Discord","diagnosticExplanation":"For human subjects (tour guide), you must use relative pronouns 'who' or 'that'. 'Which' is strictly restricted to inanimate objects or non-human animals.","remedyOptions":[{"text":"I met a tour guide who explained the historical significance of the flora to us.","isCorrect":true,"explanation":"Perfect! 'Who' refers to the human guide, and 'explained... to us' is the correct dative object prepositional setup."},{"text":"I met a tour guide which explained the historical significance of the flora to us.","isCorrect":false,"explanation":"Incorrect. 'Which' is still used for the human guide."},{"text":"I met a tour guide whose explained the historical significance of the flora.","isCorrect":false,"explanation":"Incorrect. 'Whose' is a possessive relative pronoun (e.g., 'whose camera was lost'), which doesn't fit before the action verb here."}],"linguisticRule":"Use relative pronoun 'who' (or 'that') for people. Use 'which' (or 'that') for things and contexts. Use 'whose' for possessive links."},{"id":10,"unitId":10,"focus":"Indirect Questions & Word Order","symptom":"Could you tell me where is the local modern art gallery located?","highlightedBug":"where is the local modern art gallery located","errorType":"Embedded Question Order","diagnosticExplanation":"When a question is embedded inside an introductory phrase like 'Could you tell me...', it must follow standard statement word order [Subject + Verb] rather than question word order [Verb + Subject].","remedyOptions":[{"text":"Could you tell me where the local modern art gallery is located?","isCorrect":true,"explanation":"Sublime! Subject ('the local modern art gallery') correctly precedes verb ('is') in this embedded statement layout."},{"text":"Could you tell me where is located the local modern art gallery?","isCorrect":false,"explanation":"Incorrect. This maintains verb-subject inversion ('is' before the gallery)."},{"text":"Could you tell me where does locate the local modern art gallery?","isCorrect":false,"explanation":"Incorrect. Relies on auxiliary 'does' which is forbidden in indirect question alignments."}],"linguisticRule":"Direct questions invert subject & verb (Where is it?). Embedded or indirect questions do not invert (Could you tell me where it is?). Never double-interrogate."}],"source":"C:/Users/vviei/Downloads/remix_-dialogue-practice"}</script>
  <script>
    (function () {
      var data = JSON.parse(document.getElementById("course-data").textContent);
      var pages = [
        { id: "welcome", label: "Welcome", group: "Shared" },
        { id: "syllabus", label: "10-Unit Syllabus", group: "Shared" },
        { id: "practice", label: "Practice Studio", group: "Student" },
        { id: "student", label: "Student Portal", group: "Student" },
        { id: "teacher", label: "Teacher Workspace", group: "Your side" },
        { id: "progress", label: "Progress", group: "Shared" },
        { id: "messages", label: "Messages", group: "Shared" }
      ];

      var skills = [
        { id: "reading", label: "Reading" },
        { id: "listening", label: "Listening" },
        { id: "vocabulary", label: "Vocabulary" },
        { id: "grammar", label: "Grammar" },
        { id: "speaking", label: "Speaking" },
        { id: "writing", label: "Writing" },
        { id: "levelup", label: "Level Up" },
        { id: "challenge", label: "Challenge" }
      ];

      var state = {
        page: normalizePage(location.hash.replace("#", "")) || "welcome",
        unitId: 1,
        skill: "reading"
      };

      function normalizePage(page) {
        return pages.some(function (item) { return item.id === page; }) ? page : "";
      }

      function currentUnit() {
        return data.units.find(function (unit) { return unit.id === state.unitId; }) || data.units[0];
      }

      function h(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function pageTitle(title, body) {
        return '<div class="section-title"><h2>' + h(title) + '</h2><p>' + h(body) + '</p></div>';
      }

      function pills(items, dark) {
        return '<div class="pill-row">' + items.map(function (item) {
          return '<span class="pill' + (dark ? " dark" : "") + '">' + h(item) + '</span>';
        }).join("") + '</div>';
      }

      function list(items) {
        return '<ul class="options">' + (items || []).map(function (item) {
          return '<li>' + h(item) + '</li>';
        }).join("") + '</ul>';
      }

      function renderNav() {
        var nav = document.getElementById("nav");
        nav.innerHTML = pages.map(function (page) {
          return '<button type="button" class="' + (page.id === state.page ? "active" : "") + '" data-page="' + page.id + '">' + h(page.label) + '</button>';
        }).join("");

        var mobileNav = document.getElementById("mobileNav");
        mobileNav.innerHTML = pages.map(function (page) {
          return '<option value="' + page.id + '"' + (page.id === state.page ? " selected" : "") + '>' + h(page.group + " - " + page.label) + '</option>';
        }).join("");
      }

      function renderUnitGrid() {
        return '<div class="unit-grid">' + data.units.map(function (unit) {
          var isActive = unit.id === state.unitId ? " active" : "";
          return '<button type="button" class="unit-card' + isActive + '" data-unit="' + unit.id + '">' +
            '<strong>' + h(unit.title) + '</strong>' +
            '<span>' + h(unit.theme) + '</span>' +
            '<div class="pill-row"><span class="pill">' + h(unit.difficulty) + '</span><span class="pill">8 skills</span></div>' +
          '</button>';
        }).join("") + '</div>';
      }

      function renderInventory() {
        var totalQuestions = data.units.reduce(function (sum, unit) {
          return sum + unit.reading.questions.length + unit.listening.questions.length + unit.grammar.questions.length;
        }, 0);
        var vocabItems = data.units.reduce(function (sum, unit) {
          return sum + unit.vocabulary.items.length;
        }, 0);
        return '<div class="inventory">' +
          '<div><strong>' + data.units.length + '</strong><span>Units imported</span></div>' +
          '<div><strong>' + totalQuestions + '</strong><span>Question items</span></div>' +
          '<div><strong>' + vocabItems + '</strong><span>Vocabulary items</span></div>' +
          '<div><strong>' + (data.levelUp.length + data.vocabularySwapper.length + data.grammarDoctor.length) + '</strong><span>Challenge sets</span></div>' +
        '</div>';
      }

      function renderWelcome() {
        return '<section class="page">' +
          '<div class="hero-grid">' +
            '<div class="hero-panel">' +
              '<span class="eyebrow">MET Proficiency Mastery 2.0</span>' +
              '<h1>A serious preparation space for adult healthcare learners.</h1>' +
              '<p>This file keeps the clean platform direction and brings the downloaded 10-unit practice course into one organized place. Practice Studio is a complement; teacher diagnosis and approved feedback stay controlled on your side.</p>' +
              '<div class="metric-row">' +
                '<div class="metric"><strong>10</strong><span>MET units</span></div>' +
                '<div class="metric"><strong>70%</strong><span>MET preparation</span></div>' +
                '<div class="metric"><strong>30%</strong><span>Healthcare focus</span></div>' +
                '<div class="metric"><strong>58 / 59</strong><span>Working goal</span></div>' +
              '</div>' +
            '</div>' +
            '<aside class="dark-panel">' +
              '<div>' +
                '<span class="eyebrow">Next class target</span>' +
                '<div class="dark-card">' +
                  '<h3>Speaking Q4: Organise Clinical Opinions</h3>' +
                  '<p>Class starts Tuesday, 7:00 PM. Bring one medical, workplace, or patient communication scenario you can deliver in 40-60 seconds.</p>' +
                  pills(["Approved feedback", "Teacher diagnosis", "Practice complement"], true) +
                '</div>' +
              '</div>' +
              '<div class="dark-metrics"><div><strong>10</strong>Units left</div><div><strong>Approved</strong>Feedback</div><div><strong>0%</strong>Goal state</div></div>' +
            '</aside>' +
          '</div>' +
          pageTitle("Evidence-Based Clinical Flow", "The platform keeps teacher diagnosis, student practice, feedback approval, and visible progress separated.") +
          '<div class="grid-4">' +
            workflowCard("1", "Target profiles", "Define goals before evaluation, such as clinical nurse standards or targeted speaking grades.") +
            workflowCard("2", "Evidence diagnostics", "Identify strengths in speaking, writing, and vocabulary with concrete evaluated samples.") +
            workflowCard("3", "Structured practice", "Use the 10-unit syllabus as a complement for targeted drills, roleplay, and review.") +
            workflowCard("4", "Instructor verification", "Approved clinician feedback appears in the student portal only after your review.") +
          '</div>' +
          '<div class="panel">' +
            '<span class="eyebrow">Imported course inventory</span>' +
            renderInventory() +
          '</div>' +
        '</section>';
      }

      function workflowCard(number, title, body) {
        return '<div class="card"><div class="number-badge">' + h(number) + '</div><h3>' + h(title) + '</h3><p>' + h(body) + '</p></div>';
      }

      function renderSyllabus() {
        var unit = currentUnit();
        return '<section class="page">' +
          pageTitle("Shared Syllabus Map", "A structure-first map of the 10-unit course. It separates shared course organization from your teacher workspace and the student portal.") +
          renderUnitGrid() +
          '<div class="split">' +
            '<div class="panel">' +
              '<span class="eyebrow">Selected unit</span>' +
              '<h3>' + h(unit.title) + '</h3>' +
              '<p>' + h(unit.theme) + '</p>' +
              pills(["Listening", "Reading", "Vocabulary", "Grammar", "Speaking", "Writing", "Level Up", "Challenge"], false) +
              '<div class="grid-2" style="margin-top:16px">' +
                compactSkill("Reading", unit.reading.title, unit.reading.focus) +
                compactSkill("Listening", unit.listening.title, unit.listening.type) +
                compactSkill("Vocabulary", unit.vocabulary.title, unit.vocabulary.type) +
                compactSkill("Grammar", unit.grammar.title, unit.grammar.focus) +
                compactSkill("Speaking", unit.speaking.title, unit.speaking.timing) +
                compactSkill("Writing", unit.writing.title, unit.writing.genre + " / " + unit.writing.wordCount) +
              '</div>' +
            '</div>' +
            '<aside class="panel">' +
              '<span class="eyebrow">How this is divided</span>' +
              '<h3>Your side</h3>' +
              '<p>Teacher workspace, diagnostics, homework decisions, reports, approvals, and teacher-only notes.</p>' +
              '<h3>Student side</h3>' +
              '<p>Dashboard, assigned practice, approved feedback, progress, messages, and Practice Studio access.</p>' +
              '<h3>Shared</h3>' +
              '<p>Welcome overview, syllabus map, and the visible learning path.</p>' +
            '</aside>' +
          '</div>' +
        '</section>';
      }

      function compactSkill(label, title, body) {
        return '<div class="card"><span class="eyebrow">' + h(label) + '</span><h3>' + h(title) + '</h3><p>' + h(body) + '</p></div>';
      }

      function renderPractice() {
        var unit = currentUnit();
        return '<section class="page">' +
          pageTitle("Practice Studio", "Student-facing complement for the 10-unit course. It supports practice without replacing teacher diagnosis or approved feedback.") +
          renderUnitGrid() +
          '<div class="tabbar">' + skills.map(function (skill) {
            return '<button type="button" class="' + (skill.id === state.skill ? "active" : "") + '" data-skill="' + skill.id + '">' + h(skill.label) + '</button>';
          }).join("") + '</div>' +
          '<div class="panel">' +
            '<span class="eyebrow">' + h(unit.title) + '</span>' +
            renderSkillContent(unit, state.skill) +
          '</div>' +
        '</section>';
      }

      function renderSkillContent(unit, skill) {
        if (skill === "reading") return renderReading(unit);
        if (skill === "listening") return renderListening(unit);
        if (skill === "vocabulary") return renderVocabulary(unit);
        if (skill === "grammar") return renderGrammar(unit);
        if (skill === "speaking") return renderSpeaking(unit);
        if (skill === "writing") return renderWriting(unit);
        if (skill === "levelup") return renderLevelUp(unit);
        return renderChallenge(unit);
      }

      function renderReading(unit) {
        return '<h3>' + h(unit.reading.title) + '</h3>' +
          '<p class="muted">' + h(unit.reading.focus) + '</p>' +
          '<div class="split">' +
            '<div><div class="reading-text">' + h(unit.reading.text) + '</div></div>' +
            '<aside>' + renderQuestions(unit.reading.questions) + '</aside>' +
          '</div>' +
          '<div class="note teacher-note"><strong>Teacher note:</strong> ' + h(unit.reading.teachingNote) + '</div>';
      }

      function renderListening(unit) {
        return '<h3>' + h(unit.listening.title) + '</h3>' +
          '<p class="muted">' + h(unit.listening.type) + '</p>' +
          '<div class="note"><strong>Before listening:</strong> ' + h(unit.listening.preListening) + '</div>' +
          '<div class="split" style="margin-top:14px">' +
            '<div>' + renderDialogue(unit.listening.script) + '</div>' +
            '<aside>' + renderQuestions(unit.listening.questions) + '<div class="note"><strong>After listening:</strong> ' + h(unit.listening.postListening) + '</div></aside>' +
          '</div>';
      }

      function renderDialogue(lines) {
        return '<div class="dialogue">' + (lines || []).map(function (line) {
          var highlights = (line.highlightWords || []).map(function (item) {
            return '<span class="pill">' + h(item.word) + ': ' + h(item.definition) + '</span>';
          }).join("");
          return '<div class="line"><b>' + h(line.speaker) + '</b><div><p>' + h(line.text) + '</p>' + (highlights ? '<div class="pill-row">' + highlights + '</div>' : '') + '</div></div>';
        }).join("") + '</div>';
      }

      function renderVocabulary(unit) {
        return '<h3>' + h(unit.vocabulary.title) + '</h3>' +
          '<p class="muted">' + h(unit.vocabulary.type) + '</p>' +
          '<div class="vocab-grid">' + unit.vocabulary.items.map(function (item) {
            return '<div class="vocab-card"><strong>' + h(item.phrase) + '</strong><p>' + h(item.definition) + '</p><p><em>' + h(item.example) + '</em></p></div>';
          }).join("") + '</div>' +
          '<div class="panel" style="margin-top:14px"><span class="eyebrow">Matching practice</span>' +
          '<div class="vocab-grid">' + unit.vocabulary.matchingGame.map(function (item) {
            return '<div class="vocab-card"><strong>' + h(item.phrase) + '</strong><p>' + h(item.definition) + '</p></div>';
          }).join("") + '</div></div>' +
          '<div class="note teacher-note"><strong>Teacher note:</strong> ' + h(unit.vocabulary.teachingNote) + '</div>';
      }

      function renderGrammar(unit) {
        return '<h3>' + h(unit.grammar.title) + '</h3>' +
          '<p class="muted">' + h(unit.grammar.focus) + '</p>' +
          '<div class="grid-2">' +
            '<div class="card"><span class="eyebrow">Examples</span>' + list(unit.grammar.examples) + '</div>' +
