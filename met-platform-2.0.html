            '<div class="card"><span class="eyebrow">Practice questions</span>' + renderGrammarQuestions(unit.grammar.questions) + '</div>' +
          '</div>';
      }

      function renderGrammarQuestions(questions) {
        return '<ol class="question-list">' + questions.map(function (q) {
          return '<li class="question"><h4>' + h(q.sentence) + '</h4>' +
            '<p class="muted">Target verb: ' + h(q.verb) + '</p>' +
            '<ul class="options">' + q.options.map(function (option, index) {
              return '<li class="' + (index === q.correctAnswer ? "correct" : "") + '">' + h(option) + '</li>';
            }).join("") + '</ul>' +
            '<p class="explanation">' + h(q.explanation) + '</p></li>';
        }).join("") + '</ol>';
      }

      function renderSpeaking(unit) {
        return '<h3>' + h(unit.speaking.title) + '</h3>' +
          '<div class="grid-2">' +
            '<div class="card"><span class="eyebrow">Setup</span><p>' + h(unit.speaking.setup) + '</p><p><strong>Timing:</strong> ' + h(unit.speaking.timing) + '</p><p>' + h(unit.speaking.instructions) + '</p></div>' +
            '<div class="card"><span class="eyebrow">Target language</span>' + list(unit.speaking.targetLanguage) + '</div>' +
            '<div class="card"><span class="eyebrow">Follow-up</span>' + list(unit.speaking.followUp) + '</div>' +
            '<div class="note teacher-note"><strong>Teacher note:</strong> ' + h(unit.speaking.teachingNote) + '</div>' +
          '</div>';
      }

      function renderWriting(unit) {
        return '<h3>' + h(unit.writing.title) + '</h3>' +
          '<div class="grid-2">' +
            '<div class="card"><span class="eyebrow">' + h(unit.writing.genre) + '</span><p><strong>Word count:</strong> ' + h(unit.writing.wordCount) + '</p><p>' + h(unit.writing.prompt) + '</p></div>' +
            '<div class="card"><span class="eyebrow">Criteria</span>' + list(unit.writing.criteria) + '</div>' +
          '</div>' +
          '<div class="note teacher-note"><strong>Teacher note:</strong> ' + h(unit.writing.teachingNote) + '</div>';
      }

      function renderLevelUp(unit) {
        var items = data.levelUp.filter(function (item) { return item.unitId === unit.id; });
        if (!items.length) {
          return '<h3>Level Up</h3><p class="muted">No Level Up item is attached to this unit yet.</p>';
        }
        return '<h3>Level Up Sentence Work</h3>' + items.map(function (item) {
          return '<div class="card" style="margin-top:12px">' +
            '<span class="eyebrow">B1 to B2 upgrade</span>' +
            '<p><strong>B1:</strong> ' + h(item.b1Sentence) + '</p>' +
            '<p><strong>B2 goal:</strong> ' + h(item.b2Goal) + '</p>' +
            '<p class="muted">' + h(item.b1Critique) + '</p>' +
            '<div class="grid-2">' +
              '<div>' + item.targetKeywords.map(function (kw) {
                return '<div class="vocab-card"><strong>' + h(kw.word) + '</strong><p>Replaces: ' + h(kw.equivalent) + '</p><p>' + h(kw.reason) + '</p></div>';
              }).join("") + '</div>' +
              '<div>' + renderLevelOptions(item) + '</div>' +
            '</div>' +
            '<div class="note"><strong>C1 alternative:</strong> ' + h(item.c1AdvancedAlternative) + '</div>' +
            '<p class="muted"><strong>Inversion hint:</strong> ' + h(item.sentenceInversionHint) + '</p>' +
          '</div>';
        }).join("");
      }

      function renderLevelOptions(item) {
        return '<ol class="question-list">' + item.options.map(function (option, index) {
          return '<li class="question"><h4>' + h(option.level) + (index === item.correctOptionIndex ? " - target answer" : "") + '</h4><p>' + h(option.text) + '</p><p class="explanation">' + h(option.explanation) + '</p></li>';
        }).join("") + '</ol>';
      }

      function renderChallenge(unit) {
        var swapper = data.vocabularySwapper.find(function (item) { return item.unitId === unit.id; });
        var doctor = data.grammarDoctor.find(function (item) { return item.unitId === unit.id; });
        return '<h3>Challenge Set</h3>' +
          '<div class="grid-2">' +
            '<div class="card"><span class="eyebrow">Vocabulary swapper</span>' + renderSwapper(swapper) + '</div>' +
            '<div class="card"><span class="eyebrow">Grammar doctor</span>' + renderDoctor(doctor) + '</div>' +
          '</div>' +
          '<div class="panel" style="margin-top:14px"><span class="eyebrow">Mixed MET check</span>' +
          renderQuestions(unit.reading.questions.slice(0, 2).concat(unit.listening.questions.slice(0, 2))) +
          '</div>';
      }

      function renderSwapper(item) {
        if (!item) return '<p class="muted">No vocabulary challenge attached yet.</p>';
        return '<p>' + h(item.sentence) + '</p>' + item.targets.map(function (target) {
          return '<div class="vocab-card"><strong>' + h(target.simpleWord) + ' -> ' + h(target.correctWord) + '</strong>' + list(target.options) + '<p>' + h(target.explanation) + '</p></div>';
        }).join("");
      }

      function renderDoctor(item) {
        if (!item) return '<p class="muted">No grammar doctor challenge attached yet.</p>';
        return '<h3>' + h(item.focus) + '</h3><p><strong>Symptom:</strong> ' + h(item.symptom) + '</p><p><strong>Error type:</strong> ' + h(item.errorType) + '</p><p>' + h(item.diagnosticExplanation) + '</p>' +
          '<ol class="question-list">' + item.remedyOptions.map(function (option) {
            return '<li class="question"><h4>' + (option.isCorrect ? "Correct repair" : "Needs revision") + '</h4><p>' + h(option.text) + '</p><p class="explanation">' + h(option.explanation) + '</p></li>';
          }).join("") + '</ol>' +
          '<div class="note"><strong>Rule:</strong> ' + h(item.linguisticRule) + '</div>';
      }

      function renderQuestions(questions) {
        return '<ol class="question-list">' + (questions || []).map(function (q) {
          return '<li class="question"><h4>' + h(q.question) + '</h4>' +
            '<ul class="options">' + q.options.map(function (option, index) {
              return '<li class="' + (index === q.correctAnswer ? "correct" : "") + '">' + h(String.fromCharCode(65 + index) + ". " + option) + '</li>';
            }).join("") + '</ul>' +
            '<p class="explanation">' + h(q.explanation) + '</p></li>';
        }).join("") + '</ol>';
      }

      function renderStudent() {
        return '<section class="page">' +
          pageTitle("Student Side", "Simple student-facing areas: dashboard, assigned homework, approved feedback, progress, messages, and practice access.") +
          '<div class="grid-3">' +
            '<div class="card"><span class="eyebrow">Today\'s focus</span><h3>Fuller MET speaking answers</h3><p>Give a clear opinion, choose one reason, and add a concrete example from work or daily life.</p></div>' +
            '<div class="card"><span class="eyebrow">Before our next class</span><h3>Assigned practice</h3><p>Record one 60-second answer and complete the selected unit reading questions before class.</p><button class="primary-btn" data-page="practice">Open Practice Studio</button></div>' +
            '<div class="card"><span class="eyebrow">Upcoming class</span><h3>Tuesday, 7:00 PM</h3><p>Bring one healthcare or workplace situation that you can explain clearly in English.</p></div>' +
          '</div>' +
          '<div class="grid-2">' +
            '<div class="panel"><span class="eyebrow">Approved feedback</span><h3>What is becoming stronger</h3><p>Your answer was clearer when you used a real workplace example instead of staying general.</p><h3>Your next step</h3><p>Plan your reason before you start speaking. This will make your response easier to follow.</p></div>' +
            '<div class="panel"><span class="eyebrow">Messages</span><h3>Teacher note available</h3><p>New speaking practice is available this week. Focus on giving fuller answers with examples.</p><button class="ghost-btn" data-page="messages">Open Messages</button></div>' +
          '</div>' +
        '</section>';
      }

      function renderTeacher() {
        var unit = currentUnit();
        return '<section class="page">' +
          pageTitle("Your Side", "Teacher workspace for diagnostic notes, homework decisions, reports, feedback approval, and course organization.") +
          '<div class="grid-2">' +
            '<div class="panel"><span class="eyebrow">Teacher-only diagnosis</span><h3>Diagnostic feedback stays here first</h3><p>Student can answer familiar topics but needs a stronger opening sentence, clearer reason selection, and more controlled connectors under time pressure.</p><div class="note teacher-note">This diagnostic detail is not automatically shown to the student.</div></div>' +
            '<div class="panel"><span class="eyebrow">Approval controls</span><h3>Student feedback draft</h3><textarea class="textarea">Today\'s focus: We worked on giving a fuller MET speaking answer with a clear opinion and one example.\\n\\nWhat is becoming stronger: Your answer was clearer when you used a real workplace example instead of staying general.\\n\\nYour next step: Plan your reason before you start speaking.</textarea><div class="approval-row"><button class="primary-btn">Approve for student</button><button class="ghost-btn">Keep as draft</button></div></div>' +
          '</div>' +
          '<div class="panel">' +
            '<span class="eyebrow">Selected unit for homework builder</span><h3>' + h(unit.title) + '</h3><p>' + h(unit.theme) + '</p>' +
            pills(["Reading homework", "Speaking recording", "Vocabulary review", "Grammar repair", "Writing prompt"], false) +
          '</div>' +
          '<div class="grid-3">' +
            '<div class="card"><span class="eyebrow">Reports</span><h3>Evidence first</h3><p>Do not assign scores where there are not enough samples. Show what has and has not been evaluated.</p></div>' +
            '<div class="card"><span class="eyebrow">Homework builder</span><h3>Type-first practice</h3><p>Choose exercise type first, then fill it with the most relevant unit content.</p></div>' +
            '<div class="card"><span class="eyebrow">Feedback history</span><h3>Approve before publishing</h3><p>Draft, edit, and approve student-friendly feedback before it appears on the student side.</p></div>' +
          '</div>' +
        '</section>';
      }

      function renderProgress() {
        return '<section class="page">' +
          pageTitle("Progress", "Shared progress should stay honest. Skills that have not been practiced enough stay marked as not evaluated yet.") +
          '<div class="grid-2">' +
            progressCard("Speaking", 24, "Evidence collected: opening structure and examples. Needs more timed samples.") +
            progressCard("Writing", 12, "One short response reviewed. Not enough evidence for a full score.") +
            progressCard("Listening", 0, "Not evaluated yet. Complete listening practice before review.") +
            progressCard("Reading", 0, "Not evaluated yet. Complete reading questions before review.") +
          '</div>' +
          '<div class="panel"><span class="eyebrow">Unit pathway</span>' + renderUnitGrid() + '</div>' +
        '</section>';
      }

      function progressCard(label, width, body) {
        return '<div class="card status-line"><h3>' + h(label) + '</h3><div class="bar"><span style="width:' + width + '%"></span></div><p>' + h(body) + '</p></div>';
      }

      function renderMessages() {
        return '<section class="page">' +
          pageTitle("Messages", "Clear reminders and teacher communication without mixing sensitive diagnosis into the student feed.") +
          '<div class="grid-2">' +
            '<div class="panel"><span class="eyebrow">Announcement board</span><h3>New speaking practice is available this week.</h3><p>Focus on giving fuller answers with examples. Try recording your response before class so we can review it together.</p><h3>MET vocabulary focus</h3><p>Work and career vocabulary is ready for review in the unit practice area.</p></div>' +
            '<div class="panel"><span class="eyebrow">Message teacher</span><h3>Question for next class</h3><textarea class="textarea">I want to practice giving a clearer reason before I speak.</textarea><div class="approval-row"><button class="primary-btn">Save message</button><button class="ghost-btn">Clear</button></div></div>' +
          '</div>' +
        '</section>';
      }

      function render() {
        renderNav();
        var content = document.getElementById("content");
        if (state.page === "welcome") content.innerHTML = renderWelcome();
        if (state.page === "syllabus") content.innerHTML = renderSyllabus();
        if (state.page === "practice") content.innerHTML = renderPractice();
        if (state.page === "student") content.innerHTML = renderStudent();
        if (state.page === "teacher") content.innerHTML = renderTeacher();
        if (state.page === "progress") content.innerHTML = renderProgress();
        if (state.page === "messages") content.innerHTML = renderMessages();
      }

      document.addEventListener("click", function (event) {
        var pageButton = event.target.closest("[data-page]");
        if (pageButton) {
          state.page = pageButton.getAttribute("data-page");
          location.hash = state.page;
          render();
          return;
        }

        var unitButton = event.target.closest("[data-unit]");
        if (unitButton) {
          state.unitId = Number(unitButton.getAttribute("data-unit"));
          render();
          return;
        }

        var skillButton = event.target.closest("[data-skill]");
        if (skillButton) {
          state.skill = skillButton.getAttribute("data-skill");
          render();
        }
      });

      document.getElementById("mobileNav").addEventListener("change", function (event) {
        state.page = event.target.value;
        location.hash = state.page;
        render();
      });

      window.addEventListener("hashchange", function () {
        var next = normalizePage(location.hash.replace("#", ""));
        if (next && next !== state.page) {
          state.page = next;
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
