<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MET Proficiency Mastery 2.0</title>
  <style>
    :root {
      --navy: #0f1b2d;
      --navy-2: #172437;
      --teal: #148891;
      --teal-dark: #0f6b73;
      --mint: #e7f6f3;
      --mist: #f5f8fa;
      --line: #d7e3e8;
      --slate: #52687a;
      --ink: #071527;
      --white: #ffffff;
      --amber: #c86607;
      --shadow: 0 16px 36px rgba(15, 27, 45, 0.12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--mist);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, select, textarea, input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell { min-height: 100vh; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(240px, 1.1fr) minmax(420px, 2fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--navy);
      color: var(--white);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(15, 27, 45, 0.18);
    }

    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.08;
      color: var(--navy);
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: #7b8da0;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .nav-wrap {
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .nav {
      display: flex;
      gap: 6px;
      min-width: max-content;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef4f6;
    }

    .nav button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 7px;
      background: transparent;
      color: #66798c;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .nav button.active {
      background: var(--navy);
      color: var(--white);
      box-shadow: 0 6px 14px rgba(15, 27, 45, 0.18);
    }

    .right-tools {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .role-pill {
      min-width: 142px;
      padding: 7px 16px;
      border: 1px solid #bfdde0;
      border-radius: 999px;
      background: var(--mint);
      color: var(--teal-dark);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }

    .export-btn {
      min-height: 42px;
      padding: 9px 18px;
      border-radius: 9px;
      background: var(--navy);
      color: var(--white);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .mobile-select {
      display: none;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--navy);
      font-weight: 800;
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .page {
      display: grid;
      gap: 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 0.95fr);
      gap: 24px;
      align-items: stretch;
    }

    .hero-panel {
      min-height: 320px;
      padding: 36px 32px 24px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 0 0 14px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-panel h1 {
      max-width: 780px;
      margin: 0;
      color: var(--ink);
      font-size: clamp(34px, 4.4vw, 58px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .hero-panel p {
      max-width: 760px;
      margin: 22px 0 0;
      color: var(--slate);
      font-size: 17px;
      line-height: 1.65;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 16px;
      margin-top: 30px;
    }

    .metric {
      min-height: 82px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fbfb;
    }

    .metric strong {
      display: block;
      color: var(--navy);
      font-size: 23px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 9px;
      color: #295d68;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .dark-panel {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 26px;
      border-radius: 0 0 14px 14px;
      background: var(--navy-2);
      color: var(--white);
      box-shadow: var(--shadow);
    }

    .dark-panel h2, .dark-panel h3 {
      margin: 0;
      color: var(--white);
      line-height: 1.18;
    }

    .dark-panel p {
      color: #c9d7e2;
      line-height: 1.58;
    }

    .dark-card {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .dark-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dark-metrics div {
      min-height: 64px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 10px;
      font-weight: 800;
      color: #a9bed1;
      text-transform: uppercase;
    }

    .dark-metrics strong {
      display: block;
      color: var(--white);
      font-size: 20px;
      line-height: 1.1;
    }

    .section-title {
      margin: 4px 0 0;
    }

    .section-title h2 {
      margin: 0;
      color: var(--navy);
      font-size: 20px;
      line-height: 1.2;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--slate);
      font-size: 13px;
      line-height: 1.5;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card, .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
    }

    .card {
      padding: 18px;
    }

    .panel {
      padding: 22px;
    }

    .card h3, .panel h3 {
      margin: 0;
      color: var(--navy);
      font-size: 16px;
      line-height: 1.25;
    }

    .card p, .panel p, .muted {
      color: var(--slate);
      line-height: 1.55;
    }

    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--teal);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.7px;
      text-transform: uppercase;
    }

    .number-badge {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      border-radius: 7px;
      background: var(--navy);
      color: var(--white);
      font-weight: 900;
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .unit-card {
      min-height: 152px;
      text-align: left;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .unit-card:hover,
    .unit-card.active {
      transform: translateY(-1px);
      border-color: #85c7cb;
      box-shadow: 0 12px 24px rgba(20, 136, 145, 0.12);
    }

    .unit-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--navy);
      font-size: 14px;
      line-height: 1.25;
    }

    .unit-card span {
      display: block;
      color: var(--slate);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 5px 9px;
      border: 1px solid #cde1e5;
      border-radius: 999px;
      background: #f6fbfb;
      color: #315f68;
      font-size: 11px;
      font-weight: 800;
    }

    .pill.dark {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #dceef0;
    }

    .tabbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef4f6;
    }

    .tabbar button {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 7px;
      background: transparent;
      color: #5f7385;
      font-size: 12px;
      font-weight: 900;
    }

    .tabbar button.active {
      background: var(--navy);
      color: var(--white);
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(290px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    .reading-text {
      white-space: pre-line;
      color: #263f53;
      line-height: 1.75;
      font-size: 15px;
    }

    .dialogue {
      display: grid;
      gap: 10px;
    }

    .line {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfdfe;
    }

    .line b {
      color: var(--teal-dark);
      font-size: 12px;
      text-transform: uppercase;
    }

    .line p {
      margin: 0;
      color: #243b50;
      line-height: 1.55;
    }

    .question-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .question {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
    }

    .question h4 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 14px;
      line-height: 1.35;
    }

    .options {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .options li {
      padding: 9px 10px;
      border: 1px solid #dce8ec;
      border-radius: 7px;
      color: #31495d;
      background: var(--white);
      font-size: 13px;
    }

    .options li.correct {
      border-color: #99d2c7;
      background: var(--mint);
      color: #0d5a5e;
      font-weight: 800;
    }

    .explanation {
      margin: 10px 0 0;
      color: var(--slate);
      font-size: 13px;
      line-height: 1.5;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .vocab-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
    }

    .vocab-card strong {
      display: block;
      color: var(--navy);
      margin-bottom: 7px;
    }

    .vocab-card p {
      margin: 0;
      color: var(--slate);
      font-size: 13px;
      line-height: 1.5;
    }

    .note {
      padding: 14px;
      border-left: 4px solid var(--teal);
      background: #eff8f8;
      color: #315d66;
      line-height: 1.55;
    }

    .teacher-note {
      border-left-color: var(--amber);
      background: #fff7ed;
      color: #6d3b0d;
    }

    .status-line {
      display: grid;
      gap: 10px;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #dde9ed;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), #6bbfb0);
    }

    .approval-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .primary-btn, .ghost-btn {
      min-height: 38px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .primary-btn {
      background: var(--navy);
      color: var(--white);
    }

    .ghost-btn {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--navy);
    }

    .textarea {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--navy);
      background: #fbfdfe;
    }

    .inventory {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .inventory div {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
    }

    .inventory strong {
      display: block;
      color: var(--navy);
      font-size: 20px;
    }

    .inventory span {
      color: var(--slate);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    footer {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 0 18px 24px;
      color: #7f91a1;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .right-tools {
        justify-content: flex-start;
      }

      .hero-grid,
      .split {
        grid-template-columns: 1fr;
      }

      .unit-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-4,
      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      main {
        padding: 12px;
      }

      .topbar {
        padding: 10px 12px;
      }

      .nav-wrap {
        display: none;
      }

      .mobile-select {
        display: block;
      }

      .hero-panel {
        min-height: auto;
        padding: 24px 18px;
      }

      .hero-panel h1 {
        font-size: 34px;
      }

      .metric-row,
      .dark-metrics,
      .grid-2,
      .grid-3,
      .grid-4,
      .unit-grid,
      .vocab-grid,
      .inventory {
        grid-template-columns: 1fr;
      }

      .line {
        grid-template-columns: 1fr;
      }

      .right-tools {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .role-pill,
      .export-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">MET</div>
        <div>
          <strong>MET Proficiency<br>Mastery 2.0</strong>
          <span>Interactive Michigan English Test Preparation</span>
        </div>
      </div>
      <div class="nav-wrap">
        <nav class="nav" id="nav"></nav>
      </div>
      <div class="right-tools">
        <select class="mobile-select" id="mobileNav" aria-label="Choose page"></select>
        <div class="role-pill">Clinician Portal</div>
        <button class="export-btn" data-page="teacher">Teacher Review</button>
      </div>
    </header>

    <main id="content"></main>
    <footer>
      File 2.0 keeps the original platform separate and packages the imported practice-course structure into one standalone HTML file.
    </footer>
  </div>

of her trip had become easier than expected.'"},{"id":5,"question":"Where was Maya's new room facing?","options":["The street","The elevator","The garden","The café"],"correctAnswer":2,"explanation":"The receptionist moved her to a room 'facing the garden.'"}],"teachingNote":"Use this as a gentle first reading task. Ask students to underline time references and hotel-service vocabulary."},"listening":{"title":"Hotel Check-In with a Room Request","difficulty":"B1+","type":"Conversation","script":[{"id":1,"speaker":"Receptionist","text":"Good evening. Welcome to River View Hotel. How can I help you?"},{"id":2,"speaker":"Guest","text":"Hi, I have a reservation under Daniel Costa."},{"id":3,"speaker":"Receptionist","text":"Let me check. Yes, one single room for two nights."},{"id":4,"speaker":"Guest","text":"That's right. I also requested a quiet room because I have an online meeting tomorrow morning."},{"id":5,"speaker":"Receptionist","text":"I see the note here. We can give you a room on the fifth floor, away from the elevator."},{"id":6,"speaker":"Guest","text":"That would be perfect. Is breakfast included?"},{"id":7,"speaker":"Receptionist","text":"Yes, breakfast is served from seven to ten. The gym opens at six if you want to exercise before your meeting."},{"id":8,"speaker":"Guest","text":"Great. I'll probably use it tomorrow."},{"id":9,"speaker":"Receptionist","text":"Here is your key card. Enjoy your stay."}],"questions":[{"id":1,"question":"How long is Daniel Costa staying?","options":["One night","Two nights","Three nights","Four nights"],"correctAnswer":1,"explanation":"The receptionist confirms 'one single room for two nights.'"},{"id":2,"question":"Why does Daniel Costa want a quiet room?","options":["He needs to sleep in late.","He has an online meeting tomorrow morning.","He dislikes traffic noise.","He wants to study vocabulary."],"correctAnswer":1,"explanation":"Daniel mentions: 'I also requested a quiet room because I have an online meeting tomorrow morning.'"},{"id":3,"question":"What time does the gym open?","options":["5:00 a.m.","6:00 a.m.","7:00 a.m.","8:00 a.m."],"correctAnswer":1,"explanation":"The receptionist explicitly states: 'The gym opens at six.'"}],"preListening":"Ask: What do people usually request when checking in at a hotel?","postListening":"Role-play a hotel check-in and make one lifestyle-related request."},"vocabulary":{"title":"Accommodation Target","difficulty":"B1+","type":"matching","items":[{"phrase":"reception","definition":"the front desk area in a hotel","example":"Check in with the host at the reception."},{"phrase":"reservation","definition":"an arrangement to keep a room or table for you","example":"We have a dinner reservation under Daniel Costa."},{"phrase":"key card","definition":"a plastic card used to open a hotel room","example":"Put the key card near the door reader to unlock."},{"phrase":"elevator","definition":"a machine that carries people between floors","example":"The elevator takes you to the fifth floor."},{"phrase":"lobby","definition":"the entrance area of a hotel","example":"Let's meet in the lobby before going out."},{"phrase":"available","definition":"free or ready to be used","example":"Is the quiet room available tonight?"},{"phrase":"included","definition":"part of the price or service","example":"Is fresh breakfast included with the room?"},{"phrase":"quiet room","definition":"a room away from noise","example":"They checked into a quiet room facing the garden."}],"matchingGame":[{"phrase":"reception","definition":"the front desk area in a hotel"},{"phrase":"reservation","definition":"an arrangement to keep a room/table"},{"phrase":"key card","definition":"a plastic card used to open a room"},{"phrase":"elevator","definition":"a machine carrying people between floors"},{"phrase":"lobby","definition":"the entrance area of a hotel"},{"phrase":"available","definition":"free or ready to be used"},{"phrase":"included","definition":"part of the price or service"},{"phrase":"quiet room","definition":"a room situated away from noise"}],"teachingNote":"Focus on hotel-service vocabulary. Have pupils practice matching words with definitions."},"grammar":{"title":"Present Simple vs Present Continuous","difficulty":"B1+","focus":"Routines and temporary situations","examples":["I usually walk to work.","This week I am staying at a hotel."],"questions":[{"id":1,"sentence":"I usually ___ breakfast at home.","verb":"have","options":["have","am having","haves","had"],"correctAnswer":0,"explanation":"Present simple is used for habitual routines (indicated by 'usually')."},{"id":2,"sentence":"This week, she ___ in a rented apartment.","verb":"stay","options":["stays","is staying","stay","stayed"],"correctAnswer":1,"explanation":"Present continuous is used for temporary situations occurring around now (indicated by 'This week')."},{"id":3,"sentence":"They ___ yoga every Monday.","verb":"do","options":["do","are doing","does","done"],"correctAnswer":0,"explanation":"Present simple is used for recurrent routines (indicated by 'every Monday')."},{"id":4,"sentence":"We ___ for a quiet café right now.","verb":"look","options":["are looking","look","looks","is looking"],"correctAnswer":0,"explanation":"Present continuous is used for actions happening at the exact moment of speaking ('right now')."},{"id":5,"sentence":"He often ___ his phone before bed.","verb":"check","options":["checks","is checking","check","checking"],"correctAnswer":0,"explanation":"Present simple is correct for regular habits (indicated by 'often')."}]},"speaking":{"title":"Describe a Hotel Check-In Scene","difficulty":"B1+","mode":"individual","setup":"Show the hotel reception image from Reading Exercise 1","timing":"Preparation: 30 seconds. Speaking: 60 seconds.","instructions":"Describe the picture. Say where the people are, what they are doing, and how they probably feel.","followUp":["Have you ever had a difficult check-in experience?","What makes a hotel stay comfortable?"],"targetLanguage":["There is / There are...","...seems to be...","...might be...","probably","in the background..."],"teachingNote":"Push students beyond listing objects: action + inference + reason."},"writing":{"title":"Informal Email: A Short Trip","difficulty":"B1+","genre":"informal email","wordCount":"80-120 words","prompt":"Write an email to a friend about a short trip you recently took. Mention where you stayed, what you did, and one thing you would do differently next time.","criteria":["Use past tenses correctly","Organize ideas clearly","Include at least one feeling or opinion"],"teachingNote":"Good first writing task after Reading."}},{"id":2,"title":"Unit 2: Perfect Weekend Apartment","theme":"Reviews & Recommendations","difficulty":"B1+ CEFR","reading":{"title":"A Review of a Weekend Apartment","difficulty":"B1+","focus":"skimming, opinion recognition","text":"We stayed in a small apartment near the river for two nights. The location was excellent because we could walk to cafés, museums, and a weekend market. The apartment was clean and bright, although the kitchen was smaller than it looked in the photos. The host sent clear instructions before we arrived, so check-in was simple. At night, the street was a little noisy, especially on Saturday, but closing the windows helped. I would recommend this place to travelers who want to explore the city on foot and do not mind a lively neighborhood.","questions":[{"id":1,"question":"What is the main purpose of the text?","options":["To complain formally","To review accommodation","To advertise a museum","To explain transport rules"],"correctAnswer":1,"explanation":"The text reviews a stay at an apartment, highlighting location, setup, noise, and recommendations."},{"id":2,"question":"The reviewer says the kitchen was bigger than expected.","options":["True","False"],"correctAnswer":1,"explanation":"The reviewer explicitly mentions the kitchen was 'smaller than it looked in the photos.'"},{"id":3,"question":"Who would probably enjoy this apartment most?","options":["Travelers who want a quiet countryside stay","Travelers who like walking around the city","People who need a large kitchen","Families who need total silence"],"correctAnswer":1,"explanation":"The author recommends it 'to travelers who want to explore the city on foot.'"},{"id":4,"question":"The reviewer's overall opinion is...","options":["mostly positive","completely negative","unclear","angry"],"correctAnswer":0,"explanation":"The reviewer offers recommendation, lists mostly good benefits, and concludes positive."}],"teachingNote":"Good for distinguishing main idea from supporting details."},"listening":{"title":"Directions to a Healthy Café","difficulty":"B1+","type":"Conversation","script":[{"id":1,"speaker":"Tourist","text":"Excuse me, is there a healthy café near here?"},{"id":2,"speaker":"Local","text":"Yes, there's one called Green Corner. It's about ten minutes away on foot."},{"id":3,"speaker":"Tourist","text":"Great. How do I get there?"},{"id":4,"speaker":"Local","text":"Walk straight along this street until you see the public library. Turn left there, and keep walking for two blocks. The café is next to a bike shop."},{"id":5,"speaker":"Tourist","text":"Is it expensive?"},{"id":6,"speaker":"Local","text":"Not really. They have lunch bowls, smoothies, and soup. It's popular with students and office workers, so it can get crowded after twelve thirty."},{"id":7,"speaker":"Tourist","text":"Maybe I'll go now, then."},{"id":8,"speaker":"Local","text":"Good idea. If you arrive before noon, you'll probably find a table."}],"questions":[{"id":1,"question":"How far away is the café on foot?","options":["About five minutes","About ten minutes","About twenty minutes","About half an hour"],"correctAnswer":1,"explanation":"The local says 'It's about ten minutes away on foot.'"},{"id":2,"question":"What is the café next to?","options":["A public library","A park","A bike shop","A gym"],"correctAnswer":2,"explanation":"The local says: 'The café is next to a bike shop.'"},{"id":3,"question":"When does the café get crowded?","options":["Before noon","After twelve thirty / 12:30","Early morning","Only on Saturday"],"correctAnswer":1,"explanation":"The local warns: 'It can get crowded after twelve thirty.'"}],"preListening":"Students predict café vocabulary: smoothie, bowl, crowded, table.","postListening":"Students give directions from school/home to a healthy place nearby."},"vocabulary":{"title":"Healthy Food Options","difficulty":"B1+","type":"fill_in_the_blank","items":[{"phrase":"whole-grain","definition":"made with the complete grain of wheat or other cereals","example":"I prefer whole-grain bread."},{"phrase":"vegetarian","definition":"not containing meat or fish products","example":"The pasta dish is completely vegetarian."},{"phrase":"dairy-free","definition":"not containing any milk, butter, or cheese products","example":"This vegetable soup is dairy-free."},{"phrase":"smoothie","definition":"a thick drink made with fruit, vegetables, and yogurt or milk","example":"She ordered a strawberry and spinach smoothie."},{"phrase":"portion","definition":"an amount of food served to one person","example":"A healthy portion of vegetables is crucial."},{"phrase":"balanced meal","definition":"a meal containing different food groups in correct quantities","example":"A balanced meal contains proteins and fibers."},{"phrase":"fresh","definition":"recently made, gathered, or picked; not preserved","example":"These apples are fresh from the garden."},{"phrase":"ingredient","definition":"one of the substances that are combined to make a dish","example":"What is the primary ingredient in this sauce?"}],"matchingGame":[{"phrase":"whole-grain","definition":"made with the complete grain"},{"phrase":"vegetarian","definition":"not containing meat or fish"},{"phrase":"dairy-free","definition":"not containing any milk products"},{"phrase":"smoothie","definition":"a thick drink made with blended fruits"},{"phrase":"portion","definition":"an amount of food served to one person"},{"phrase":"balanced meal","definition":"a meal containing different food groups"},{"phrase":"fresh","definition":"recently made, gathered, or picked"},{"phrase":"ingredient","definition":"a substance used to make a dish"}],"teachingNote":"Review food adjectives. Excellent for meals planning."},"grammar":{"title":"Past Simple vs Past Continuous","difficulty":"B1+","focus":"Travel experiences and interrupting events","examples":["I was waiting at reception when my friend arrived.","We missed the bus yesterday."],"questions":[{"id":1,"sentence":"I ___ dinner when the hotel called.","verb":"have","options":["was having","had","am having","were having"],"correctAnswer":0,"explanation":"Continuous aspect describes an ongoing background action interrupted by a shorter simple past action."},{"id":2,"sentence":"She ___ her suitcase at the airport.","verb":"lose","options":["lost","was losing","loses","loosing"],"correctAnswer":0,"explanation":"Completed past simple is correct for a sudden singular event in the past."},{"id":3,"sentence":"We ___ to the market when it started raining.","verb":"walk","options":["were walking","walked","was walking","are walking"],"correctAnswer":0,"explanation":"Continuous format is crucial since walking was ongoing when the rain started."},{"id":4,"sentence":"They ___ a great café last weekend.","verb":"find","options":["found","were finding","finded","find"],"correctAnswer":0,"explanation":"Past simple indicates completed past event specified by time ('last weekend')."},{"id":5,"sentence":"He ___ when the announcement started.","verb":"sleep","options":["was sleeping","slept","is sleeping","sleeping"],"correctAnswer":0,"explanation":"Ongoing past action uses Past Continuous."}]},"speaking":{"title":"Recommend a Healthy Restaurant","difficulty":"B1+","mode":"pair work","setup":"Student A is a visitor; Student B is a local resident.","timing":"Preparation: 2 minutes. Role-play: 3 minutes.","instructions":"Recommend a café, park, gym, market, or walking route. Explain where it is, why it is good, and who would enjoy it.","followUp":["What places in a city support a healthy lifestyle?","Are healthy options usually expensive?"],"targetLanguage":["I'd recommend...","It's suitable for...","The best thing about it is...","You should try..."],"teachingNote":"Useful for real-world recommendation language."},"writing":{"title":"Restaurant Review","difficulty":"B1+","genre":"review","wordCount":"100-140 words","prompt":"Write a review of a café or restaurant that supports a healthy lifestyle. Describe the food, atmosphere, service, and whether you would recommend it.","criteria":["Use descriptive adjectives","Give clear reasons for your opinion","Mention at least one positive and one negative point"],"teachingNote":"Connect to food vocabulary and comparative language."}},{"id":3,"title":"Unit 3: Mid-Mountain Health Retreat","theme":"Retreats & Reservations","difficulty":"B1+ CEFR","reading":{"title":"A Health Retreat in the Mountains","difficulty":"B1+","focus":"detailed comprehension, vocabulary in context","text":"The three-day mountain retreat is designed for people who want a short break from busy routines. Each morning begins with light stretching and a guided walk through the forest. After breakfast, guests can join workshops on stress management, healthy cooking, or sleep habits. The program is flexible, so visitors may skip any activity and spend time reading or resting instead. Meals are included and are made with local vegetables, grains, and fresh fruit. The retreat is not a medical treatment, but many guests say they leave with more energy and a clearer plan for improving their daily lifestyle.","questions":[{"id":1,"question":"What is the retreat mainly for?","options":["Learning extreme sports","Taking a break from busy routines","Receiving medical treatment","Training to become a chef"],"correctAnswer":1,"explanation":"The retreat is 'designed for people who want a short break from busy routines.'"},{"id":2,"question":"Guests must attend every activity.","options":["True","False"],"correctAnswer":1,"explanation":"The text says: 'The program is flexible, so visitors may skip any activity.'"},{"id":3,"question":"Which activity is mentioned in the passage?","options":["Rock climbing","Stress management","Language lessons","Night skiing"],"correctAnswer":1,"explanation":"The text mentions workshops on 'stress management, healthy cooking, or sleep habits.'"},{"id":4,"question":"In the text, 'flexible' means...","options":["expensive","easy to change","very strict","physically difficult"],"correctAnswer":1,"explanation":"'Flexible' indicates that guests do not have rigid mandates (they can swap or skip, so it is easy to change)."}],"teachingNote":"Follow up with a speaking question: Would you join this retreat? Why?"},"listening":{"title":"Making a Dinner Reservation","difficulty":"B1+","type":"Conversation","script":[{"id":1,"speaker":"Host","text":"Good afternoon, Bella Vista Restaurant. How may I help you?"},{"id":2,"speaker":"Caller","text":"Hi, I'd like to book a table for Friday evening."},{"id":3,"speaker":"Host","text":"Of course. How many people?"},{"id":4,"speaker":"Caller","text":"Four. We're celebrating my sister's new job, so we'd like a quiet table if possible."},{"id":5,"speaker":"Host","text":"We have a table at seven or eight thirty."},{"id":6,"speaker":"Caller","text":"Seven is better. Do you have vegetarian options?"},{"id":7,"speaker":"Host","text":"Yes, we have several vegetarian dishes, and we can also prepare meals without dairy if you tell your server."},{"id":8,"speaker":"Caller","text":"That's helpful. One person in our group avoids dairy."},{"id":9,"speaker":"Host","text":"No problem. May I have your name and phone number?"}],"questions":[{"id":1,"question":"What day is the reservation for?","options":["Friday evening","Saturday evening","Sunday lunch","Thursday"],"correctAnswer":0,"explanation":"The caller says 'book a table for Friday evening.'"},{"id":2,"question":"How many people will come?","options":["Two","Four","Five","Six"],"correctAnswer":1,"explanation":"The caller requests a table for 'Four.'"},{"id":3,"question":"What specific dietary exclusion is mentioned by the caller?","options":["Gluten-free","Nut-free","Dairy-free / avoiding dairy","Low sodium"],"correctAnswer":2,"explanation":"The caller says: 'One person in our group avoids dairy.'"}],"preListening":"Ask students what information restaurants need for a reservation.","postListening":"Students create a reservation dialogue with one special request."},"vocabulary":{"title":"Transit & Movement Definitions","difficulty":"B1+","type":"collocation","items":[{"phrase":"commute","definition":"travel regularly between home and work","example":"My daily commute takes thirty minutes."},{"phrase":"delay","definition":"a situation when something happens later than planned","example":"There is a severe delay on the trains."},{"phrase":"route","definition":"the way from one place to another","example":"This is the fastest route to the harbor."},{"phrase":"gate","definition":"the area where passengers board a plane","example":"Please arrive at gate 18 thirty minutes before."},{"phrase":"connection","definition":"a second bus, train, or flight to continue a journey","example":"We nearly missed our train connection."},{"phrase":"traffic","definition":"vehicles moving on public roads","example":"Heavy morning traffic delayed the taxi."},{"phrase":"cancel","definition":"to decide that a planned event will not happen","example":"They had to cancel the outdoor tour due to rain."},{"phrase":"refund","definition":"money returned to a customer","example":"The agency provided a full refund for the ticket."}],"matchingGame":[{"phrase":"commute","definition":"travel regularly between home and work"},{"phrase":"delay","definition":"something happens later than planned"},{"phrase":"route","definition":"the path or way between places"},{"phrase":"gate","definition":"the boarding area for a plane"},{"phrase":"connection","definition":"second transit vehicle to continue"},{"phrase":"traffic","definition":"vehicles on roads"},{"phrase":"cancel","definition":"decide an event will not happen"},{"phrase":"refund","definition":"money returned to a customer"}],"teachingNote":"Focus on collocations related to transportation: 'heavy traffic', 'miss a connection'."},"grammar":{"title":"Present Perfect for Experiences","difficulty":"B1-B2","focus":"Life and travel experiences","examples":["I have stayed in many hostels.","She has never tried a digital detox."],"questions":[{"id":1,"sentence":"I ___ never ___ a wellness retreat.","verb":"try","options":["have / tried","has / tried","did / try","am / trying"],"correctAnswer":0,"explanation":"Present perfect utilizes 'subject + have/has + past participle' for life experiences."},{"id":2,"sentence":"She ___ already ___ the hotel rooms.","verb":"book","options":["has / booked","have / booked","did / book","is / booking"],"correctAnswer":0,"explanation":"'She' requires 'has', plus the past participle form."},{"id":3,"sentence":"We ___ visited this market before.","verb":"not","options":["have not","has not","did not","never"],"correctAnswer":0,"explanation":"'We' takes the helper verb 'have' negative: 'have not'."},{"id":4,"sentence":"Have you ever ___ a connecting flight?","verb":"miss","options":["missed","miss","missing","misses"],"correctAnswer":0,"explanation":"Use past participle 'missed' in the yes/no experience question."},{"id":5,"sentence":"They ___ just ___ from their long trip.","verb":"return","options":["have / returned","has / returned","re-turned","returned"],"correctAnswer":0,"explanation":"'They have just + past participle' is used to express recent events."}]},"speaking":{"title":"Develop a Balanced Weekend Plan","difficulty":"B1+","mode":"presentation","setup":"Students create a balanced weekend including rest, chores, social time, and exercise.","timing":"Preparation: 3 minutes. Speaking: 90 seconds.","instructions":"Present your weekend plan and explain why it is balanced.","followUp":["What would you remove if you became too busy?","Do you prefer planned or spontaneous weekends?"],"targetLanguage":["First, I'm going to...","This helps me because...","I would avoid...","A good balance includes..."],"teachingNote":"Connect to future forms and lifestyle vocabulary."},"writing":{"title":"Travel Itinerary Draft","difficulty":"B1+","genre":"itinerary","wordCount":"80-120 words","prompt":"Create a one-day itinerary for a visitor who wants a relaxing lifestyle experience in your city. Include morning, afternoon, and evening activities.","criteria":["Use appropriate time expressions","Use future forms cleanly","Include practical details (places, times)"],"teachingNote":"Useful for platform submissions with structured format."}},{"id":4,"title":"Unit 4: Airport Announcements","theme":"Airport Wellness & Delays","difficulty":"B1+ CEFR","reading":{"title":"Airport Wellness Announcement","difficulty":"B1+","focus":"scanning, specific information","text":"Attention passengers. During today's delays, the airport is offering free access to the Quiet Zone on Level 2, near Gate 18. This area includes comfortable seats, charging points, and low lighting. Passengers can also join a ten-minute stretching session at 3:00 p.m. and 5:00 p.m. near the information desk. Please remember that food is not allowed inside the Quiet Zone, but bottled water is permitted. Families with small children may prefer the play area opposite Gate 12.","questions":[{"id":1,"question":"Why is the airport offering the Quiet Zone?","options":["Because there are delays","Because flights are canceled forever","Because restaurants are closed","Because Gate 12 is full"],"correctAnswer":0,"explanation":"The text starts: 'During today's delays, the airport is offering free access...'"},{"id":2,"question":"Where is the Quiet Zone located?","options":["Level 1, Gate 12","Level 2, near Gate 18","Opposite the café","Near baggage claim"],"correctAnswer":1,"explanation":"The flyer notes: 'free access to the Quiet Zone on Level 2, near Gate 18.'"},{"id":3,"question":"Passengers can take bottled water into the Quiet Zone.","options":["True","False"],"correctAnswer":0,"explanation":"The text specifies: 'but bottled water is permitted.'"},{"id":4,"question":"What may families with small children prefer?","options":["The play area opposite Gate 12","The stretching session","The information desk","The charging points"],"correctAnswer":0,"explanation":"The final line notes: 'Families with small children may prefer the play area opposite Gate 12.'"}],"teachingNote":"Practice fast scanning: give students 60 seconds to find times and places."},"listening":{"title":"Airport Announcement about Delays","difficulty":"B1-B2","type":"Announcement","script":[{"id":1,"speaker":"Announcer","text":"Attention passengers traveling on Flight 482 to Lisbon. Due to strong winds, boarding will begin approximately forty minutes later than planned."},{"id":2,"speaker":"Announcer","text":"Please remain near Gate 16 and check the screens for updates."},{"id":3,"speaker":"Announcer","text":"Passengers who need assistance should speak to a member of staff at the service desk."},{"id":4,"speaker":"Announcer","text":"The airport lounge is currently full, but free water is available near the gate."},{"id":5,"speaker":"Announcer","text":"If you have a connecting flight, please do not leave the area."},{"id":6,"speaker":"Announcer","text":"Our team will provide updated information as soon as possible. We apologize for the delay and thank you for your patience."}],"questions":[{"id":1,"question":"What caused the delayed boarding?","options":["Heavy rain","Strong winds","Mechanical failure","Staff strike"],"correctAnswer":1,"explanation":"The announcement states: 'Due to strong winds, boarding will begin...'"},{"id":2,"question":"How long is the boarding delay?","options":["Directly canceled","Twenty minutes later","Forty minutes later","Two hours later"],"correctAnswer":2,"explanation":"The boarding will start 'approximately forty minutes later than planned.'"},{"id":3,"question":"What should passengers with connecting flights do?","options":["Leave the gate immediately","Speak to local security","Do not leave the area","Book a hotel room"],"correctAnswer":2,"explanation":"He advises: 'If you have a connecting flight, please do not leave the area.'"}],"preListening":"Students list common airport announcement words.","postListening":"Students write one short airport announcement."},"vocabulary":{"title":"Wellness Activities Vocabulary","difficulty":"B1-B2","type":"fill_in_the_blank","items":[{"phrase":"stretching","definition":"moving muscles gently to make them less tight","example":"Doing 10 minutes of stretching relieves soreness."},{"phrase":"guided walk","definition":"a walk led by someone who explains features of the place","example":"We joined a guided walk in the national park."},{"phrase":"retreat","definition":"a quiet place or event for rest, healing, or personal development","example":"They booked a yoga and diet retreat."},{"phrase":"stress management","definition":"techniques used to control personal stress levels","example":"The class focused on mindful breathing for stress management."},{"phrase":"sleep habits","definition":"behaviors related to sleeping patterns and preparing for bed","example":"Better sleep habits include putting screens away."},{"phrase":"energy","definition":"the strength and vigor required for physical or mental action","example":"Waking up early gives her high cognitive energy."},{"phrase":"routine","definition":"a sequence of actions regularly followed","example":"A morning routine gives you control."},{"phrase":"relaxation","definition":"the state of being free from tension or anxiety","example":"Reading a book brings pure relaxation."}],"matchingGame":[{"phrase":"stretching","definition":"moving muscles to make them less tight"},{"phrase":"guided walk","definition":"a walk led by an expert explaining context"},{"phrase":"retreat","definition":"a quiet place for rest or development"},{"phrase":"stress management","definition":"ways/techniques to control stress levels"},{"phrase":"sleep habits","definition":"behaviors related to sleep patterns"},{"phrase":"energy","definition":"strength required for physical action"},{"phrase":"routine","definition":"regularly followed sequence of actions"},{"phrase":"relaxation","definition":"the state of being free from tension"}],"teachingNote":"Encourage students to group words by 'mental' vs 'physical' wellness categories."},"grammar":{"title":"Future Forms","difficulty":"B1-B2","focus":"Plans, predictions, and arrangements","examples":["I'm going to visit the market. (plan)","I'll call the hotel now. (immediate decision)"],"questions":[{"id":1,"sentence":"We ___ stay near the beach next month.","verb":"plan","options":["are going to","will","stays","stayed"],"correctAnswer":0,"explanation":"Use 'be going to' to specify pre-planned future intentions."},{"id":2,"sentence":"I think the café ___ be crowded at lunch.","verb":"predict","options":["will","is going","being","is"],"correctAnswer":0,"explanation":"Use 'will' for predictions based on general thoughts or beliefs (indicated by 'I think')."},{"id":3,"sentence":"The train is late, so I ___ take a taxi instead.","verb":"decision","options":["will","am going to","taking","was"],"correctAnswer":0,"explanation":"Use 'will' for immediate spontaneous decision made at the moment of speaking."},{"id":4,"sentence":"She ___ meeting the tour guide at 9 a.m.","verb":"arrange","options":["is","will","going to","does"],"correctAnswer":0,"explanation":"Present continuous 'is meeting' denotes pre-arranged fixed appointments."},{"id":5,"sentence":"They ___ probably enjoy the relaxation seminar.","verb":"predict","options":["will","are","going to","not"],"correctAnswer":0,"explanation":"'Probably' is positioned after 'will' to state a likely future prediction."}]},"speaking":{"title":"Collaboratively Solve a Travel Problem","difficulty":"B1-B2","mode":"pair work","setup":"Students receive a problem card: canceled train, lost booking, noisy room, or closed restaurant.","timing":"Preparation: 2 minutes. Role-play: 4 minutes.","instructions":"Discuss the problem, suggest two solutions, choose the best one, and explain your decision.","followUp":["What is more important: saving time or saving money?","How can people stay calm when travel plans change?"],"targetLanguage":["We could...","Another option is...","The problem is that...","I think the best solution is..."],"teachingNote":"Great for modals, negotiation, and decision-making."},"writing":{"title":"Formal Email: Booking Problem","difficulty":"B1-B2","genre":"formal email","wordCount":"120-160 words","prompt":"You stayed at a hotel, but your room was noisy and the Wi-Fi did not work well. Write a formal email to the hotel manager explaining the problem and requesting a solution.","criteria":["Use polite formal language structures","Explain the problem clearly with consequences","Request a reasonable resolution"],"teachingNote":"Practice complaint structure: context → problem → impact → request."}},{"id":5,"title":"Unit 5: Menus & Wellness Lifestyles","theme":"Nutrition & Holiday Choices","difficulty":"B1-B2 CEFR","reading":{"title":"A Smart Lunch Menu","difficulty":"B1-B2","focus":"scanning, comparison","text":"Green Plate Café offers three lunch sets from Monday to Friday. The Energy Bowl includes brown rice, grilled chicken, avocado, and vegetables. The Garden Plate is vegetarian and comes with lentils, roasted carrots, salad, and yogurt sauce. The Quick Soup Set includes vegetable soup, whole-grain bread, and a small fruit cup. Customers who bring a reusable cup receive a discount on coffee or tea. The café is busiest between 12:30 and 1:15, so visitors who want a quieter lunch should arrive before noon or after 1:30.","questions":[{"id":1,"question":"Which lunch key option is fully vegetarian?","options":["Energy Bowl","Garden Plate","Quick Soup Set","Coffee discount"],"correctAnswer":1,"explanation":"The text notes: 'The Garden Plate is vegetarian and comes with lentils...'"},{"id":2,"question":"Customers can get a discount if they bring a reusable cup.","options":["True","False"],"correctAnswer":0,"explanation":"The menu specifies: 'Customers who bring a reusable cup receive a discount...'"},{"id":3,"question":"What block of time is quietest for lunch?","options":["12:45 p.m.","1:00 p.m.","Before noon or after 1:30","12:30 p.m."],"correctAnswer":2,"explanation":"The cafe is busiest 12:30-1:15. For quiet, arrive before noon or after 1:30."},{"id":4,"question":"What comes as part of the Quick Soup Set?","options":["Rice and chicken","Whole-grain bread and a small fruit cup","Avocado and salad","Carrots and tea"],"correctAnswer":1,"explanation":"The Quick Soup Set includes: 'vegetable soup, whole-grain bread, and a small fruit cup.'"}],"teachingNote":"Useful for food vocabulary and making lifestyle recommendations."},"listening":{"title":"Travel Agent and Wellness Holiday","difficulty":"B1-B2","type":"Conversation","script":[{"id":1,"speaker":"Agent","text":"So, what kind of holiday are you looking for?"},{"id":2,"speaker":"Customer","text":"I want to relax, but I don't want to just sit by a pool all day."},{"id":3,"speaker":"Agent","text":"In that case, a wellness holiday might suit you. There's a place by the lake with yoga classes, short hikes, and healthy cooking workshops."},{"id":4,"speaker":"Customer","text":"That sounds interesting. Is it suitable for beginners?"},{"id":5,"speaker":"Agent","text":"Definitely. The activities are gentle, and guests can choose what they want to join."},{"id":6,"speaker":"Customer","text":"I like that. I also need reliable internet because I may have to check work emails."},{"id":7,"speaker":"Agent","text":"The rooms have Wi-Fi, but the program encourages guests to limit screen time."}],"questions":[{"id":1,"question":"What type of holiday does the agent suggest?","options":["Cruise","A wellness holiday","Party weekend","Backpacking expedition"],"correctAnswer":1,"explanation":"The agent explicitly recommends a 'wellness holiday.'"},{"id":2,"question":"What activities are offered at the lakeside site?","options":["Yoga classes, short hikes, and healthy cooking workshops","Surfing, diving, kayaking","Historical museum walks and painting","Tennis camps and bar parties"],"correctAnswer":0,"explanation":"The agent lists: 'yoga classes, short hikes, and healthy cooking workshops.'"},{"id":3,"question":"Why does the customer require internet access?","options":["To stream music","To check work emails","To download books","To video call family"],"correctAnswer":1,"explanation":"The customer explains: 'I also need reliable internet because I may have to check work emails.'"}],"preListening":"Discuss: What makes a holiday relaxing but active?","postListening":"Students recommend a holiday for a busy professional."},"vocabulary":{"title":"Technology & Daily Habits","difficulty":"B1-B2","type":"word_family","items":[{"phrase":"notification","definition":"a message or alert from an app on your smartphone","example":"I disabled every social app notification."},{"phrase":"screen time","definition":"the amount of time spent looking at digital devices","example":"We recorded three hours of screen time."},{"phrase":"device","definition":"an electronic tool like a phone, tablet, or calculator","example":"Keep your digital device out of the bedroom."},{"phrase":"offline","definition":"not connected to the internet","example":"It is peaceful to spend Sunday offline."},{"phrase":"app","definition":"abbreviation for application software","example":"She downloaded a meditation app."},{"phrase":"digital detox","definition":"a set period where a person avoids electronic devices","example":"A weekend digital detox refreshed his focus."},{"phrase":"message","definition":"a written or oral communication sent digitally","example":"He sent a quick voice message."},{"phrase":"settings","definition":"the control adjustments on a phone or program","example":"Adjust active settings to do not disturb."}],"matchingGame":[{"phrase":"notification","definition":"a digital alert or message from an app"},{"phrase":"screen time","definition":"time spent looking at digital displays"},{"phrase":"device","definition":"an electronic tool e.g., smartphone"},{"phrase":"offline","definition":"not connected to the internet"},{"phrase":"app","definition":"mobile application software"},{"phrase":"digital detox","definition":"period spent using technology less"},{"phrase":"message","definition":"communication sent electronically"},{"phrase":"settings","definition":"options controlling a device setup"}],"teachingNote":"Have students discuss their personal screen time limits."},"grammar":{"title":"Modals for Advice and Suggestions","difficulty":"B1-B2","focus":"Lifestyle and habits recommendations","examples":["You should drink more water.","You could try walking after work."],"questions":[{"id":1,"sentence":"You ___ book early because the hotel is very popular.","verb":"advice","options":["should","could","mustn't","would"],"correctAnswer":0,"explanation":"Use 'should' for strong friendly advice or recommendations."},{"id":2,"sentence":"You ___ try a digital detox if notifications stress you.","verb":"suggestion","options":["could","mustn't","shouldn't","must"],"correctAnswer":0,"explanation":"Use 'could' to make gentle, non-authoritative suggestions."},{"id":3,"sentence":"You ___ eat in the Quiet Zone; it is not permitted.","verb":"obligation","options":["mustn't / can't","could","should","might"],"correctAnswer":0,"explanation":"'Mustn't' or 'can't' is correct for prohibition (actions not allowed)."},{"id":4,"sentence":"We ___ take the bus, but a taxi is much faster.","verb":"possibility","options":["could","shouldn't","must","haven't"],"correctAnswer":0,"explanation":"Use 'could' to list one possible option among alternatives."},{"id":5,"sentence":"You ___ talk to reception if your room is too noisy.","verb":"advice","options":["should","mustn't","couldn't","aren't"],"correctAnswer":0,"explanation":"'Should' is appropriate to state the best course of action."}]},"speaking":{"title":"Express Opinion: Weekly Digital Detox","difficulty":"B2-","mode":"individual","setup":"Students respond to an opinion prompt.","timing":"Preparation: 30 seconds. Speaking: 90 seconds.","instructions":"Do you think people should spend one day a week without social media? Give reasons and examples.","followUp":["Would this be realistic for students or workers?","What are the disadvantages of being offline?"],"targetLanguage":["In my opinion...","One reason is that...","On the other hand...","For example..."],"teachingNote":"Train Statement → Reason → Support."},"writing":{"title":"Blog Post: Digital Detox Experience","difficulty":"B2-","genre":"blog post","wordCount":"150-200 words","prompt":"Write a blog post about spending a weekend with limited phone use. Explain what you did, how you felt, and whether you would recommend it.","criteria":["Use engaging narrative language","Reflect clearly on feelings and thoughts","Conclude with a specific recommendation"],"teachingNote":"Encourage linking words: 'at first', 'later', 'by the end'."}},{"id":6,"title":"Unit 6: City Lifestyles & Habits","theme":"Urban Cycling & Routines","difficulty":"B2- CEFR","reading":{"title":"City Cycling Tour","difficulty":"B2-","focus":"detailed comprehension, inference","text":"The City Cycling Tour is a relaxed two-hour ride designed for visitors who want to see everyday life beyond the main tourist streets. The route passes through a public park, a university area, two quiet residential streets, and a small food market. Helmets and bikes are provided, and the guide stops several times for photos and short explanations. Participants should be comfortable riding in light traffic, but the tour avoids busy roads whenever possible. It is not recommended for people who have not ridden a bike recently. In case of heavy rain, the tour is moved to the next morning or fully refunded.","questions":[{"id":1,"question":"What makes the tour different from typical tourist routes?","options":["It focuses on everyday city life","It only visits historical museums","It is performed solely at night","It uses electric scooters"],"correctAnswer":0,"explanation":"The text says it is 'designed for visitors who want to see everyday life beyond the main tourist streets.'"},{"id":2,"question":"Participants need to bring their own helmets.","options":["True","False"],"correctAnswer":1,"explanation":"The text explicitly states: 'Helmets and bikes are provided.'"},{"id":3,"question":"Who should probably avoid this tour?","options":["People who enjoy organic food markets","People comfortable in light traffic","People who have not ridden a bike recently","People who like visiting university campuses"],"correctAnswer":2,"explanation":"The passage notes: 'It is not recommended for people who have not ridden a bike recently.'"},{"id":4,"question":"The tour organizers seem to care about...","options":["speed more than safety","safety and flexibility","luxury shopping opportunities","avoiding all residential zones"],"correctAnswer":1,"explanation":"Providing helmets, avoiding busy roads, and offering flexible rain rescheduling/refunds show care for safety and flexibility."}],"teachingNote":"Ask students to identify risk/safety language."},"listening":{"title":"Interview: Changing Morning Habits","difficulty":"B2-","type":"Interview","script":[{"id":1,"speaker":"Interviewer","text":"Welcome to the podcast. I'm your host, and today we're joined by our special guest. We'll be exploring how changing a morning routine can profoundly impact one's entire day."},{"id":2,"speaker":"Interviewer","text":"To start us off, you changed your morning routine last year. What was the biggest difference?"},{"id":3,"speaker":"Guest","text":"I stopped checking my phone as soon as I woke up. At first, it felt strange because I was used to reading messages in bed."},{"id":4,"speaker":"Interviewer","text":"What do you do instead?"},{"id":5,"speaker":"Guest","text":"I drink water, stretch for five minutes, and write down the three most important things I need to do. You can do this using a digital app, or simply write it in a physical notebook. Focusing on just three tasks is effective for productivity and focus because it prevents overwhelming you and forces you to prioritize what truly matters. It sounds simple, but it helps me start the day calmly."},{"id":6,"speaker":"Interviewer","text":"Did it improve your productivity?"},{"id":7,"speaker":"Guest","text":"Yes, but not magically. I still have busy days. The main benefit is that I feel more in control before other people's messages enter my mind."},{"id":8,"speaker":"Interviewer","text":"Thank you so much for being on the show. For everyone listening, the main benefit we discussed today is that taking charge of your morning helps you feel more in control of your entire day. I encourage you to reflect on your own routines tomorrow morning and see what you could change."}],"questions":[{"id":1,"question":"What habit did the guest abandon?","options":["Skipping early breakfast","Sleeping past eight","Checking the phone immediately after waking up","Stretching in bed"],"correctAnswer":2,"explanation":"The guest stated: 'I stopped checking my phone as soon as I woke up.'"},{"id":2,"question":"What three constructive things does the guest do now?","options":["Checks email, runs, prepares tea","Reads a novel, drinks coffee, exercises","Drinks water, stretches for five minutes, writes down three key tasks","Cleans the room, cooks oatmeal, plans agenda"],"correctAnswer":2,"explanation":"The guest recounts: 'I drink water, stretch for five minutes, and write down the three most important things...'"},{"id":3,"question":"What is described as the primary benefit?","options":["Higher salary","Less workload","Feeling more in control before external messages enter their mind","Zero stressful days"],"correctAnswer":2,"explanation":"The guest says: 'The main benefit is that I feel more in control before other people's messages enter my mind.'"}],"preListening":"Students rank morning habits from healthiest to least healthy.","postListening":"Students describe one habit they would like to change."},"vocabulary":{"title":"City & Community Target","difficulty":"B2-","type":"matching","items":[{"phrase":"neighborhood","definition":"an area of a town or city, and the people who live in it","example":"Our neighborhood organizes cleanups."},{"phrase":"resident","definition":"a person who lives in a particular place","example":"She is a local resident of the old town."},{"phrase":"community","definition":"people living or working together in an area","example":"The organic café serves the entire community."},{"phrase":"inclusive","definition":"open and suitable for many different kinds of people","example":"The walk was extremely inclusive."},{"phrase":"volunteer","definition":"a person who works or helps without being paid","example":"He is a volunteer at the public garden."},{"phrase":"public space","definition":"an area like a park or plaza that anyone can use","example":"Libraries are important public spaces."},{"phrase":"local","definition":"connected to the particular area you are discussing","example":"They buy fresh local ingredients."},{"phrase":"connection","definition":"a relationship or feeling of closeness with others","example":"Walking together fosters a deep social connection."}],"matchingGame":[{"phrase":"neighborhood","definition":"an area of a town or city"},{"phrase":"resident","definition":"a person who lives in a area"},{"phrase":"community","definition":"people living or working together"},{"phrase":"inclusive","definition":"open and suitable for everyone"},{"phrase":"volunteer","definition":"someone who helps without pay"},{"phrase":"public space","definition":"area that anyone can freely use"},{"phrase":"local","definition":"connected to a particular near area"},{"phrase":"connection","definition":"relationship or feeling of closeness"}],"teachingNote":"Ask students to find contrast words: however, still, especially."},"grammar":{"title":"Comparatives and Superlatives","difficulty":"B1-B2","focus":"Comparing lifestyle and routines","examples":["This room is quieter than the first one.","The earliest train is the most convenient."],"questions":[{"id":1,"sentence":"A smaller city is usually ___ than a capital.","verb":"quiet","options":["quieter","more quiet","quietest","the quietest"],"correctAnswer":0,"explanation":"Flat one-syllable adjectives form their comparative using '-er' (quieter)."},{"id":2,"sentence":"This local café is ___ than the one near the train station.","verb":"healthy","options":["healthier","more healthy","healthiest","healthier than"],"correctAnswer":0,"explanation":"Adjectives ending in '-y' change to 'i' and add '-er' (healthier)."},{"id":3,"sentence":"The gym is the ___ place in the hotel during peak hours.","verb":"busy","options":["busiest","busyest","more busy","busier"],"correctAnswer":0,"explanation":"The definite article 'the' triggers the superlative form (busiest)."},{"id":4,"sentence":"Walking to work is ___ expensive than hiring taxis daily.","verb":"little","options":["less","least","lesser","little"],"correctAnswer":0,"explanation":"'Less' is the correct comparative modifier for negative comparisons."},{"id":5,"sentence":"This is the ___ routine I have tried for productivity.","verb":"good","options":["best","better","goodest","most good"],"correctAnswer":0,"explanation":"'Best' is the irregular superlative of 'good'."}]},"speaking":{"title":"Compare Lifestyles: City vs Town","difficulty":"B2-","mode":"group work","setup":"Group compares city lifestyle and small-town lifestyle.","timing":"Preparation: 4 minutes. Group discussion: 6 minutes.","instructions":"Compare advantages and disadvantages of living in a big city and a smaller town. Decide which is better for a remote worker.","followUp":["Which lifestyle is healthier?","Which offers more opportunities?","Which is more stressful?"],"targetLanguage":["Compared with...","Whereas...","A major advantage is...","It depends on..."],"teachingNote":"Encourage balanced answers rather than one-sided opinions."},"writing":{"title":"Opinion Paragraph: Remote Work","difficulty":"B2-","genre":"opinion paragraph","wordCount":"120-160 words","prompt":"Some people say remote work improves lifestyle. Others say it makes work-life balance harder. What is your opinion? Use Statement → Reason → Support.","criteria":["State a clear, focused opinion","Give at least two logical reasons","Include one realistic supporting example"],"teachingNote":"Supports argumentative structuring."}},{"id":7,"title":"Unit 7: Digital Detox Planning","theme":"Technology Balance & Offlines","difficulty":"B2- CEFR","reading":{"title":"A Digital Detox Weekend","difficulty":"B2-","focus":"inference, main idea","text":"When Leo booked a digital detox weekend, he imagined it would be easy to turn off his phone. By Saturday morning, he realized how often he reached for it without thinking. The retreat organizers collected devices at reception and offered paper maps, board games, nature walks, and cooking classes instead. At first, Leo felt disconnected from everything, but after a few hours, he started noticing small things: the sound of rain on the windows, the taste of fresh bread, and the fact that conversations lasted longer when nobody checked messages. On Sunday, he got his phone back. He did not decide to delete every app, but he changed his notification settings before leaving.","questions":[{"id":1,"question":"What is the main idea of the passage?","options":["Leo learned that cooking healthy is difficult.","Leo discovered how phone habits affected him.","The wellness retreat had poor organization.","All phones should be banned in hotel lobbies."],"correctAnswer":1,"explanation":"The passage focus is on Leo's self-realization of device habits and how he adjusted settings afterward."},{"id":2,"question":"Leo immediately found the detox easy.","options":["True","False"],"correctAnswer":1,"explanation":"The text says: 'At first, Leo felt disconnected...'"},{"id":3,"question":"What concrete parameter did Leo change before leaving?","options":["His hotel room class","His traveler route map","His notification settings","His phone casing model"],"correctAnswer":2,"explanation":"The text mentions: 'he changed his notification settings before leaving.'"},{"id":4,"question":"What can we infer about Leo's attitude?","options":["He wants a balanced use of technology.","He hates outdoor sessions completely.","He permanently lost his physical phone.","He was forced by family to attend."],"correctAnswer":0,"explanation":"He didn't delete every app, but he changed notifications, reflecting a balanced, mindful approach."},{"id":5,"question":"In the text, 'without thinking' means...","options":["carefully","automatically","politely","secretly"],"correctAnswer":1,"explanation":"'Without thinking' refers to habitual, automated actions (automatically)."}],"teachingNote":"Good transition into lifestyle habits and technology discussion."},"listening":{"title":"Narration: A Weekend Without Plans","difficulty":"B2-","type":"Narration","script":[{"id":1,"speaker":"Narrator","text":"Last month, I decided not to plan my weekend. Usually, I fill every free hour with errands, social events, and exercise classes."},{"id":2,"speaker":"Narrator","text":"This time, I only made one rule: no work emails."},{"id":3,"speaker":"Narrator","text":"On Saturday morning, I walked to a bakery without checking the time. Later, I cleaned my apartment while listening to music and called a friend I had not spoken to in weeks."},{"id":4,"speaker":"Narrator","text":"By Sunday evening, I realized that an unplanned weekend was not lazy."},{"id":5,"speaker":"Narrator","text":"It gave me space to notice what I actually wanted to do. Now I try to leave at least one afternoon free every week."}],"questions":[{"id":1,"question":"What was the speaker's only rule for the weekend?","options":["No drinking coffee","No work emails","No speaking aloud","No leaving the house"],"correctAnswer":1,"explanation":"The narrator says: 'This time, I only made one rule: no work emails.'"},{"id":2,"question":"Who did the speaker call on Saturday?","options":["Their hotel host","A friend they had not spoken to in weeks","Their work manager","The library volunteer"],"correctAnswer":1,"explanation":"The narrator specifically 'called a friend I had not spoken to in weeks.'"},{"id":3,"question":"What lesson did the speaker realize by Sunday evening?","options":["An unplanned weekend is lazy.","An unplanned weekend provides space to notice what they actually want to do.","They should work overtime.","Social media is necessary."],"correctAnswer":1,"explanation":"The speaker found 'unplanned weekend was not lazy' and 'gave me space to notice what I actually wanted to do.'"}],"preListening":"Students discuss planned vs unplanned weekends.","postListening":"Students plan a balanced weekend with free time."},"vocabulary":{"title":"Work-Life Boundaries","difficulty":"B2-","type":"fill_in_the_blank","items":[{"phrase":"boundary","definition":"a limit or rule that defines acceptable behavior or separates lifestyle areas","example":"It's vital to set a strict boundary between office and home."},{"phrase":"flexible hours","definition":"working hours that can be changed to suit worker needs","example":"My job has flexible hours so I start late."},{"phrase":"productivity","definition":"the efficiency of your output","example":"Calm mornings boost your productivity."},{"phrase":"burnout","definition":"exhaustion caused by chronic workplace stress","example":"Working every weekend leads directly to burnout."},{"phrase":"commuting","definition":"the journey between home and work","example":"Commuting by bike is a healthy habit."},{"phrase":"remote work","definition":"tasks performed away from the standard corporate office","example":"Remote work allows her to live near the beach."},{"phrase":"schedule","definition":"a plan of items and target times","example":"Her schedule has a block for daily exercises."},{"phrase":"priority","definition":"something that is regarded as more critical than other items","example":"Maintaining well-being is my main priority."}],"matchingGame":[{"phrase":"boundary","definition":"limit separating lifestyle areas"},{"phrase":"flexible hours","definition":"changeable working hours"},{"phrase":"productivity","definition":"the efficiency of of productive output"},{"phrase":"burnout","definition":"exhaustion caused by chronic stress"},{"phrase":"commuting","definition":"journey between home and workplace"},{"phrase":"remote work","definition":"work performed away from standard offices"},{"phrase":"schedule","definition":"list of events and target times"},{"phrase":"priority","definition":"most critical parameter of focus"}],"teachingNote":"Ideal transition into lifestyle habits and wellness discussion grids."},"grammar":{"title":"First Conditional","difficulty":"B1-B2","focus":"Real future possibilities and outcomes","examples":["If the train is late, we will take the bus.","If you arrive early, you will find a table."],"questions":[{"id":1,"sentence":"If the local café ___ crowded, we ___ take-out instead.","verb":"be / buy","options":["is / will get","will be / get","be / will got","are / would get"],"correctAnswer":0,"explanation":"Present simple in the if-clause ('is') combines with 'will + verb' in the main clause ('will get')."},{"id":2,"sentence":"If you ___ before noon, you ___ a quiet table.","verb":"arrive / find","options":["arrive / will find","arrives / will find","will arrive / find","arrived / would find"],"correctAnswer":0,"explanation":"Real future conditionals utilize present tense in the condition, future in result."},{"id":3,"sentence":"If it ___ heavily, the outdoor cycling tour ___ canceled.","verb":"rain / be","options":["rains / will be","rain / is","will rain / will be","rained / would be"],"correctAnswer":0,"explanation":"Third-person singular 'rains' goes into conditional condition; 'will be' is future passive."},{"id":4,"sentence":"If she ___ off her notifications, she ___ calmer.","verb":"turn / feel","options":["turns / will feel","turn / feel","will turn / feels","turned / felt"],"correctAnswer":0,"explanation":"Singular present 'turns' in conditional condition + 'will feel' for likely outcome."},{"id":5,"sentence":"If we ___ late, we ___ the instructor immediately.","verb":"be / message","options":["are / will message","will be / message","are / message","were / would message"],"correctAnswer":0,"explanation":"'We are' in present conditional + 'will message' as the certain future plan."}]},"speaking":{"title":"Plan a Community Fitness Day","difficulty":"B2-","mode":"group work","setup":"Groups design a simple event for different ages.","timing":"Preparation: 5 minutes. Presentation: 2 minutes per group.","instructions":"Plan three activities, choose a location, decide what equipment is needed, and explain how you will make the event inclusive.","followUp":["How can communities encourage healthier habits?","Should local governments pay for free health events?"],"targetLanguage":["Our first activity will be...","This would encourage...","We need to consider...","It should be accessible for..."],"teachingNote":"Links community topic with planning language."},"writing":{"title":"Advice Email: Healthy Lifestyle Advice","difficulty":"B2-","genre":"advice email","wordCount":"120-170 words","prompt":"A friend says they feel tired and disorganized because of their routine. Write an email giving practical advice about sleep, food, exercise, or screen time.","criteria":["Use modal auxiliary verbs for advice (should, could, might want to)","Sound supportive and non-judgmental","Offer specific, realistic suggestions"],"teachingNote":"Good for advice structures."}},{"id":8,"title":"Unit 8: Support Groups & Travel Solutions","theme":"Community Walking & Transportation Problems","difficulty":"B2- CEFR","reading":{"title":"The Wednesday Walking Group","difficulty":"B2-","focus":"inference, purpose","text":"Every Wednesday evening, a group of neighbors meets outside the library for a forty-minute walk. The idea began when a local nurse noticed that many older residents wanted to exercise but felt uncomfortable joining a gym. Now the group includes people of different ages, including students who want a break from screens and parents pushing strollers. The pace is gentle, and nobody is expected to be athletic. After the walk, some members stay for tea at a nearby café. The organizer says the goal is not only fitness, but also connection. For some participants, it is the only regular social event of the week.","questions":[{"id":1,"question":"Why did the walking group begin?","options":["A nurse saw a community need.","The library catalog wanted more visitors.","A franchise gym closed suddenly.","Local students organized a running race."],"correctAnswer":0,"explanation":"The walk 'began when a local nurse noticed that many older residents wanted to exercise...'"},{"id":2,"question":"Only older residents can join the walking group.","options":["True","False"],"correctAnswer":1,"explanation":"The text specifies: 'Now the group includes people of different ages, including students... and parents.'"},{"id":3,"question":"What is one purpose of the group besides exercise?","options":["Competition","Connection","Shopping discounts","Studying library catalogs"],"correctAnswer":1,"explanation":"The organizer explicitly states: 'the goal is not only fitness, but also connection.'"},{"id":4,"question":"The walking group is probably successful because it is...","options":["expensive and exclusive","simple and welcoming","fast and physically difficult","solely online check-in"],"correctAnswer":1,"explanation":"The pace is 'gentle', 'nobody is expected to be athletic', and includes all ages, meaning it is simple & welcoming."}],"teachingNote":"Use to discuss community lifestyle and social well-being."},"listening":{"title":"Conversation: Solving a Travel Problem","difficulty":"B2-","type":"Conversation","script":[{"id":1,"speaker":"Speaker A","text":"I just checked the train app. Our train has been canceled."},{"id":2,"speaker":"Speaker B","text":"Seriously? The cooking class starts in an hour."},{"id":3,"speaker":"Speaker A","text":"I know. There's a bus, but it takes forty-five minutes and leaves in ten."},{"id":4,"speaker":"Speaker B","text":"That might work if we walk fast. What about a taxi?"},{"id":5,"speaker":"Speaker A","text":"It's expensive, and traffic looks bad. The bus lane may actually be quicker."},{"id":6,"speaker":"Speaker B","text":"Okay, let's take the bus. Can you message the instructor and say we might arrive a few minutes late?"},{"id":7,"speaker":"Speaker A","text":"Sure. I'll explain the train was canceled."},{"id":8,"speaker":"Speaker B","text":"Thanks. At least we planned to leave early, or this would be much worse."}],"questions":[{"id":1,"question":"What happened to the train?","options":["It is delayed by an hour","It was canceled","It was full","It went to a different city"],"correctAnswer":1,"explanation":"Speaker A starts: 'Our train has been canceled.'"},{"id":2,"question":"Why is the bus potentially quicker than a taxi?","options":["The taxi driver is slow.","The bus lane avoids the bad automobile traffic.","The bus route is shorter.","The taxi is currently broken."],"correctAns
