[build]
  command = "node node_modules/vite/bin/vite.js build --configLoader runner"
  publish = "dist-build"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
