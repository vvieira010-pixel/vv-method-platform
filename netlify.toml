[build]
  command = "node node_modules/vite/bin/vite.js build --configLoader runner"
  publish = "dist-build"
  functions = "netlify/functions"

[build.environment]
  # Vite inlines VITE_-prefixed vars into the client bundle by design.
  # Exempt them from Netlify's secrets scanner to avoid false-positive deploy failures.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_GEMINI_API_KEY,VITE_GROQ_API_KEY,VITE_OPENAI_API_KEY,VITE_ANTHROPIC_API_KEY,VITE_ELEVENLABS_API_KEY"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
