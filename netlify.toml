[build]
  command = "npm run build"
  publish = "dist-build"
  functions = "netlify/functions"

[build.environment]
  # VITE_-prefixed keys are inlined into the client bundle.
  # Exempt them from Netlify's secrets scanner to avoid false-positive deploy failures.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_GEMINI_API_KEY,VITE_GROQ_API_KEY,VITE_ELEVENLABS_API_KEY"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
