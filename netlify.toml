[build]
  command = "node node_modules/vite/bin/vite.js build --configLoader runner"
  publish = "dist-build"
  functions = "netlify/functions"

[build.environment]
  # Vite inlines VITE_-prefixed vars into the client bundle by design. The
  # Supabase project URL and anon/publishable key are meant to be public (the
  # browser uses them; Row Level Security is the protection), so exclude them
  # from Netlify's secrets scanning to avoid false-positive deploy failures.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
