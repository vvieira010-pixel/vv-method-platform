# Quality gate — runs on every push and PR, independent of deployment.
# Added per platform audit (2026-06-17, finding F1): the repo previously had
# no test runner wired and CI only built/deployed.
name: CI
on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"   # node --test glob patterns require Node >= 21
          cache: npm
      - name: Install dependencies
        run: npm ci
      # NOTE: `npm run lint` is intentionally not gated here yet — eslint and its
      # plugins are not installed (not in package.json) and src/ has never been
      # lint-cleaned, so it would fail CI. Adding eslint deps + fixing findings is
      # a separate follow-up (audit F1). Tests are the gate for now.
      - name: Test
        run: npm test
